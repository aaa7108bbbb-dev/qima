<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مؤسسة قمة الفرصة التجارية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Tajawal', 'Poppins', Arial, sans-serif;
  overflow: hidden;
  background: #000;
}

/* Animated Background */
.animated-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0a1428 0%, #1a2a45 25%, #0f3a4f 50%, #1a2a45 75%, #0a1428 100%);
  z-index: 1;
  overflow: hidden;
}

.orb {
  position: absolute;
  border-radius: 50%;
  mix-blend-mode: screen;
  filter: blur(80px);
}

.orb1 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(45, 122, 148, 0.4) 0%, transparent 70%);
  top: -150px;
  right: -100px;
  animation: float 8s ease-in-out infinite;
}

.orb2 {
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, rgba(200, 146, 42, 0.3) 0%, transparent 70%);
  bottom: -100px;
  left: -100px;
  animation: float 10s ease-in-out infinite reverse;
}

.orb3 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(45, 122, 148, 0.25) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: float 12s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) translateX(0px); }
  25% { transform: translateY(-30px) translateX(20px); }
  50% { transform: translateY(-60px) translateX(-20px); }
  75% { transform: translateY(-30px) translateX(20px); }
}

/* Stars */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: twinkle 3s infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Grid Lines */
.grid-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(0deg, transparent 24%, rgba(45, 122, 148, 0.1) 25%, rgba(45, 122, 148, 0.1) 26%, transparent 27%, transparent 74%, rgba(45, 122, 148, 0.1) 75%, rgba(45, 122, 148, 0.1) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(45, 122, 148, 0.1) 25%, rgba(45, 122, 148, 0.1) 26%, transparent 27%, transparent 74%, rgba(45, 122, 148, 0.1) 75%, rgba(45, 122, 148, 0.1) 76%, transparent 77%, transparent);
  background-size: 100px 100px;
  opacity: 0.3;
}

/* Login Container */
.login-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(0px);
  transition: backdrop-filter 0.6s ease;
}

.login-wrapper.hidden {
  backdrop-filter: blur(0px);
  pointer-events: none;
}

.login-card {
  position: relative;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 30px;
  padding: 60px 50px;
  max-width: 450px;
  width: 90%;
  box-shadow: 
    0 8px 32px rgba(45, 122, 148, 0.3),
    inset 0 1px 1px rgba(255, 255, 255, 0.2);
  animation: slideInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
}

@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo-container {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
  animation: fadeInDown 0.8s ease 0.2s both;
}

.logo {
  width: 90px;
  height: 90px;
  background: linear-gradient(135deg, #2d7a94 0%, #0d5a6f 100%);
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  box-shadow: 0 10px 40px rgba(45, 122, 148, 0.4);
  animation: rotateLogo 20s linear infinite;
  border: 2px solid rgba(255, 255, 255, 0.2);
}

@keyframes rotateLogo {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.login-title {
  text-align: center;
  margin-bottom: 15px;
  animation: fadeInDown 0.8s ease 0.3s both;
}

.login-title h1 {
  color: #fff;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 1px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, rgba(200, 146, 42, 0.8) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-title p {
  color: rgba(255, 255, 255, 0.6);
  font-size: 14px;
  font-weight: 400;
}

#login-section {
  animation: fadeInDown 0.8s ease 0.4s both;
}

#pwd-section {
  animation: fadeInDown 0.8s ease 0.4s both;
  display: none;
}

.login-button-primary {
  width: 100%;
  height: 140px;
  background: linear-gradient(135deg, #2d7a94 0%, #0d5a6f 100%);
  border: 2px solid rgba(45, 122, 148, 0.5);
  border-radius: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 25px;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: #fff;
  font-family: 'Tajawal', Arial, sans-serif;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(45, 122, 148, 0.3);
}

.login-button-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.6s;
}

.login-button-primary:hover::before {
  left: 100%;
}

.login-button-primary:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 45px rgba(45, 122, 148, 0.5);
  border-color: rgba(45, 122, 148, 0.8);
}

.login-button-primary:active {
  transform: translateY(-2px) scale(1);
}

.icon {
  font-size: 55px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.button-text {
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.5px;
}

.pwd-input {
  width: 100%;
  padding: 16px 20px;
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  font-size: 18px;
  text-align: center;
  letter-spacing: 4px;
  font-weight: 900;
  font-family: 'Tajawal', Arial, sans-serif;
  margin-bottom: 15px;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.pwd-input::placeholder {
  color: rgba(255, 255, 255, 0.3);
}

.pwd-input:focus {
  outline: none;
  border-color: rgba(45, 122, 148, 0.8);
  background: rgba(255, 255, 255, 0.12);
  box-shadow: 0 0 20px rgba(45, 122, 148, 0.3);
}

.error-msg {
  color: #ff6b6b;
  font-size: 13px;
  margin-top: 10px;
  display: none;
  animation: shake 0.5s ease;
  font-weight: 700;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  font-family: 'Tajawal', Arial, sans-serif;
  transition: all 0.3s ease;
  margin-top: 15px;
}

.btn-login {
  background: linear-gradient(135deg, #2d7a94 0%, #0d5a6f 100%);
  color: #fff;
  box-shadow: 0 8px 25px rgba(45, 122, 148, 0.3);
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(45, 122, 148, 0.4);
}

.btn-back {
  background: rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.btn-back:hover {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
}

.footer-text {
  text-align: center;
  color: rgba(255, 255, 255, 0.4);
  font-size: 12px;
  margin-top: 30px;
  line-height: 1.6;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  margin: 20px 0;
}

@media (max-width: 768px) {
  .login-card {
    padding: 40px 30px;
  }

  .login-title h1 {
    font-size: 24px;
  }

  .logo {
    width: 70px;
    height: 70px;
    font-size: 40px;
  }
}
</style>
</head>
<body>

<div class="animated-bg">
  <div class="grid-bg"></div>
  <div class="stars" id="stars-container"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="login-wrapper" id="lock-screen">
  <div class="login-card">
    
    <div class="logo-container">
      <div class="logo">🏢</div>
    </div>

    <div class="login-title">
      <h1>قمة الفرصة</h1>
      <p>نظام إدارة التقسيط والمستثمرين</p>
    </div>

    <div class="divider"></div>

    <div id="login-section">
      <button class="login-button-primary" onclick="showPasswordSection()">
        <span class="icon">🔐</span>
        <span class="button-text">أدخل النظام</span>
      </button>
    </div>

    <div id="pwd-section">
      <input id="pwd-input" type="password" placeholder="••••••••" class="pwd-input" onkeypress="if(event.key==='Enter') checkPwd()"/>
      <p id="pwd-error" class="error-msg">❌ الرقم السري غير صحيح</p>
      <button class="btn btn-login" onclick="checkPwd()">🔓 تحقق</button>
      <button class="btn btn-back" onclick="showLoginSection()">← رجوع</button>
    </div>

    <div class="footer-text">
      <p>نظام آمن ومحمي</p>
      <p>© 2024 جميع الحقوق محفوظة</p>
    </div>

  </div>
</div>

<div id="root"></div>

<script>
// Create random stars
function createStars() {
  const container = document.getElementById('stars-container');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    container.appendChild(star);
  }
}

function showPasswordSection() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('pwd-section').style.display = 'block';
  document.getElementById('pwd-input').focus();
}

function showLoginSection() {
  document.getElementById('pwd-section').style.display = 'none';
  document.getElementById('login-section').style.display = 'block';
  document.getElementById('pwd-error').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

function checkPwd(){
  var p = document.getElementById("pwd-input").value;
  if(p === "2231245"){
    document.getElementById("lock-screen").style.display = "none";
    sessionStorage.setItem("auth", "1");
  } else {
    document.getElementById("pwd-error").style.display = "block";
    document.getElementById("pwd-input").value = "";
    document.getElementById("pwd-input").focus();
  }
}

window.addEventListener("DOMContentLoaded", function(){
  createStars();
  if(sessionStorage.getItem("auth") === "1"){
    document.getElementById("lock-screen").style.display = "none";
  }
});
</script>

<!-- React Scripts -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<!-- باقي الكود الأصلي من البرنامج -->
<script>
function checkPwdOriginal(){
  var p=document.getElementById("pwd-input").value;
  if(p==="2231245"){
    document.getElementById("lock-screen").style.display="none";
    sessionStorage.setItem("auth","1");
  } else {
    document.getElementById("pwd-error").style.display="block";
    document.getElementById("pwd-input").value="";
  }
}
window.addEventListener("DOMContentLoaded",function(){
  if(sessionStorage.getItem("auth")==="1"){
    document.getElementById("lock-screen").style.display="none";
  }
});
</script>

</body>
</html>
