// ─── helpers ───────────────────────────────────────────────
const SAR = n => Math.round(+(n||0)).toLocaleString("ar-SA",{minimumFractionDigits:0,maximumFractionDigits:0}) + " ر.س";
const NUM = n => (+(n||0)).toLocaleString("ar-SA");

function calcContract(amount, s = {profit:50, admin:2.5, acc:10, inst:10}) {
  const profit = amount * (s.profit/100);
  const admin  = amount * (s.admin/100);
  const acc    = profit * (s.acc/100);
  const inst   = profit * (s.inst/100);
  const net    = profit - admin - acc - inst;
  const total  = amount + profit;
  return { profit, admin, acc, inst, net, total };
}

function numToWords(n) {
  n = Math.round(n);
  const ones=["","واحد","اثنان","ثلاثة","أربعة","خمسة","ستة","سبعة","ثمانية","تسعة","عشرة","أحد عشر","اثنا عشر","ثلاثة عشر","أربعة عشر","خمسة عشر","ستة عشر","سبعة عشر","ثمانية عشر","تسعة عشر"];
  const tens=["","","عشرون","ثلاثون","أربعون","خمسون","ستون","سبعون","ثمانون","تسعون"];
  const hundreds=["","مائة","مئتان","ثلاثمائة","أربعمائة","خمسمائة","ستمائة","سبعمائة","ثمانمائة","تسعمائة"];
  if(n===0)return"صفر";
  let r="";
  if(n>=1000){const t=Math.floor(n/1000);r+=(t===1?"ألف":t===2?"ألفان":t<=10?ones[t]+" آلاف":numToWords(t)+" ألف")+" ";n%=1000;}
  if(n>=100){r+=hundreds[Math.floor(n/100)]+" ";n%=100;}
  if(n>=20){r+=tens[Math.floor(n/10)]+(n%10?" و"+ones[n%10]:"")+" ";n=0;}
  if(n>0)r+=ones[n]+" ";
  return r.trim();
}

function toHijri(dateStr) {
  if(!dateStr)return"..../.../14....";
  try{return new Date(dateStr).toLocaleDateString("ar-SA-u-ca-islamic",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\u200f/g,"");}
  catch{return dateStr;}
}

function addMonths(dateStr, n) {
  if(!dateStr)return"";
  const d=new Date(dateStr);
  d.setMonth(d.getMonth()+n);
  return d.toISOString().split("T")[0];
}

// الشهر المالي يبدأ من يوم 21: أي يوم قبل 21 يُحسب على الشهر السابق
function fiscalYM(dateInput){
  const d = new Date(dateInput);
  const dd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if(dd.getDate() < 21){ dd.setMonth(dd.getMonth()-1); }
  return dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0");
}

function fmtDate(dateStr) {
  if(!dateStr)return"—";
  try{return new Date(dateStr).toLocaleDateString("ar-SA",{year:"numeric",month:"long",day:"numeric"});}
  catch{return dateStr;}
}

function NewContractPage({investors, settings, contracts, onSave, toast, setInvTxList}) {
  const today = new Date().toISOString().split("T")[0];
  const nextNum = contracts.length ? Math.max(...contracts.map(c=>parseInt(c.num)||0).filter(n=>n>0), 0) + 1 : (settings.startNum||1);
  const [form, setForm] = useState({client:"",idNum:"",idType:"هوية وطنية",idIssuer:"",idIssueDate:"",address:"",nationality:"سعودي",job:"",goods:"",qty:"",category:"",investorId:"",amount:"",totalInst:"",instAmt:"",date:today,firstInst:"",num:String(nextNum),cPhone:"",gName:"",gId:"",gJob:"",gPhone:"",note:"",deductEnabled:false,deductAmount:"",deductInvestorId:"",contractType:"monthly",deferMonths:"12",deferPayments:"1",payType:"normal",bankAccount:""});
  const set = (k,v) => {
    setForm(f=>({...f,[k]:v}));
    // Auto-fill if idNum entered and matches existing contract
    if(k==="idNum" && v.length>=9){
      const prev = contracts.find(c=>c.idNum===v);
      if(prev){
        setForm(f=>({...f, idNum:v, client:prev.client||f.client, job:prev.job||f.job, cPhone:prev.cPhone||f.cPhone}));
        toast("✅ تم تعبئة بيانات العميل تلقائياً");
      }
    }
  };
  const amount = parseFloat(form.amount)||0;
  const r = amount ? calcContract(amount, settings) : null;
  // Auto-calculate lastInst: firstInst + (totalInst/instAmt - 1) months
  const numMonths = (form.totalInst && form.instAmt && parseFloat(form.instAmt) > 0)
    ? Math.round(parseFloat(form.totalInst) / parseFloat(form.instAmt))
    : 0;
  const lastInst = (form.firstInst && numMonths > 0) ? addMonths(form.firstInst, numMonths - 1) : "";

  const save = () => {
    const isDefer = form.contractType==="defer";
    // المؤجل: المبلغ والإجمالي يدوي، القسط يُحسب من الإجمالي ÷ عدد الدفعات
    let saveForm = {...form};
    if(isDefer){
      const months = parseInt(form.deferMonths)||12;
      const nPays = parseInt(form.deferPayments)||1;
      if(!form.client||!form.investorId||!amount||!form.totalInst||!form.date||!form.goods){
        toast("⚠️ يرجى تعبئة المبلغ النقدي والإجمالي وبقية الحقول","warn"); return;
      }
      const total = parseFloat(form.totalInst)||amount;  // الإجمالي اللي كتبه المستخدم (مع فائدته)
      saveForm.totalInst = total;
      saveForm.instAmt = Math.round(total/nPays);  // قيمة الدفعة
      saveForm.firstInst = form.firstInst || addMonths(form.date, nPays===1?months:Math.round(months/2));
      saveForm.numMonths = months;
    } else {
      if(!form.client||!form.investorId||!amount||!form.totalInst||!form.instAmt||!form.date||!form.goods||!form.firstInst){
        toast("⚠️ يرجى تعبئة جميع الحقول المطلوبة","warn"); return;
      }
    }
    const rr = calcContract(amount, settings);
    const id = Date.now();
    const _totalInst = parseFloat(saveForm.totalInst), _instAmt = parseFloat(saveForm.instAmt);
    const _numMonths = isDefer ? saveForm.numMonths : numMonths;
    const _lastInst = isDefer
      ? addMonths(saveForm.firstInst, (parseInt(form.deferPayments)||1)===2 ? Math.round((parseInt(form.deferMonths)||12)/2) : 0)
      : lastInst;
    // للمؤجل: الربح = الإجمالي − النقدي (فائدة المستخدم)
    const deferProfit = isDefer ? (_totalInst - amount) : rr.profit;
    const contract = {id, ...saveForm, amount, totalInst:_totalInst, instAmt:_instAmt, lastInst:_lastInst, numMonths:_numMonths,
      investorId:parseInt(form.investorId),
      profit:deferProfit, admin:rr.admin, acc:rr.acc, inst:rr.inst, net:rr.net, total:rr.total};

    setForm({client:"",idNum:"",idType:"هوية وطنية",idIssuer:"",idIssueDate:"",address:"",nationality:"سعودي",job:"",goods:"",qty:"",category:"",investorId:"",amount:"",totalInst:"",instAmt:"",date:today,firstInst:"",num:String(nn),cPhone:"",gName:"",gId:"",gJob:"",gPhone:"",note:"",deductEnabled:false,deductAmount:"",deductInvestorId:""});

    {label:"الجنسية",key:"nationality",type:"text",ph:"سعودي"},
    {label:"صادرة من",key:"idIssuer",type:"text",ph:"جهة الإصدار"},
    {label:"بتاريخ",key:"idIssueDate",type:"date",ph:""},
    {label:"عنواني",key:"address",type:"text",ph:"العنوان"},
  ];
  const fields2 = [
    {label:"قيمة العقد النقدية (القيمة) *",key:"amount",type:"number",ph:"مثال: 15000"},
    {label:"قيمة العقد أقساط (الإجمالي) *",key:"totalInst",type:"number",ph:"مثال: 18000"},

    {label:"تاريخ العقد *",key:"date",type:"date",ph:""},
    {label:"تاريخ أول قسط *",key:"firstInst",type:"date",ph:""},
  ];

  return (
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        ➕ إضافة عقد جديد

// ─── Contracts Page ──────────────────────────────────────────
const _getPaid = (payments, cid) => (payments||[]).filter(p=>p.contractId===cid).reduce((s,p)=>s+p.amount,0);

function ContractsPage({contracts,investors,settings,onDelete,onRestore,onUpdate,payments,setPayments,toast,completionAlert,setCompletionAlert,onSaveNew,setInvTxList,startCollect}) {
  const [showNew,setShowNew]=useState(false);
  const [showCollect,setShowCollect]=useState(!!startCollect);
  const [collectDate,setCollectDate]=useState(new Date().toISOString().split("T")[0]);
  const [collectSearch,setCollectSearch]=useState("");
  const [collectInv,setCollectInv]=useState("all");
  const [collectAmounts,setCollectAmounts]=useState({});
  const [payModal,setPayModal]=useState(null);
  const [payAmount,setPayAmount]=useState("");
  const [payDate,setPayDate]=useState(new Date().toISOString().split("T")[0]);
  const [payNote,setPayNote]=useState("");
  const [statusTab,setStatusTab]=useState("active");
  const [doneIds,setDoneIds]=useState(()=>{try{return JSON.parse(localStorage.getItem("qimma_done")||"[]");}catch{return[];}});
  const markDone = (id) => { const d=[...doneIds,id]; setDoneIds(d); localStorage.setItem("qimma_done",JSON.stringify(d)); };
  const addPayment=()=>{
    if(!payAmount||!payModal)return;
    const paid = _getPaid(payments, payModal.id) + parseFloat(payAmount);
    setPayments(p=>[...p,{id:Date.now(),contractId:payModal.id,amount:parseFloat(payAmount),date:payDate,note:payNote||"قسط"}]);
    setPayAmount("");setPayNote("");
    if(paid>=(payModal.totalInst||0) && !doneIds.includes(payModal.id)){
      setPayModal(null);
      setCompletionAlert(payModal);
    } else {
      toast("✅ تم تسجيل السداد");
    }
  };
  const [search,setSearch] = useState("");
  const [bond,setBond] = useState(null);
  const [bondG,setBondG] = useState(null);
  const [cheque,setCheque] = useState(null);
  const [editC,setEditC] = useState(null);
  const [editForm,setEditForm] = useState({});
  const [chequeG,setChequeG] = useState(null);
  const [contractDoc,setContractDoc] = useState(null);
  const [invSearch,setInvSearch] = useState("");
  const [reportMode,setReportMode] = useState("detailed"); // detailed or brief
  const allFiltered = contracts.filter(c=>!c.deleted && (c.client.includes(search)||(investors.find(i=>String(i.id)===String(c.investorId))?.name||"").includes(search)));
  const deletedList = contracts.filter(c=>c.deleted && (c.client.includes(search)||(investors.find(i=>String(i.id)===String(c.investorId))?.name||"").includes(search)));
  const isDefer = c => c.contractType==="defer";
  const deferList = allFiltered.filter(isDefer);
  // الشهري فقط في active/done، المؤجل في تبويبه
  const monthlyFiltered = allFiltered.filter(c=>!isDefer(c));
  const filtered = statusTab==="deleted" ? deletedList
    : statusTab==="defer" ? deferList
    : monthlyFiltered.filter(c=> statusTab==="active" ? !doneIds.includes(c.id) : doneIds.includes(c.id));
  const activeCount = monthlyFiltered.filter(c=>!doneIds.includes(c.id)).length;
  const completedCount = monthlyFiltered.filter(c=>doneIds.includes(c.id)).length;
  const deferCount = deferList.length;
  const deletedCount = deletedList.length;

  // Investor report
  const invReportContracts = invSearch
    ? contracts.filter(c=>!c.deleted && (investors.find(i=>String(i.id)===String(c.investorId))?.name||"")===invSearch && !doneIds.includes(c.id))
    : [];

  const today2 = new Date().toISOString().split("T")[0];

  // وضع إنشاء عقد جديد
  if(showNew){
    return (
      <div>
        <button style={{...styles.btn("#e5e7eb",C.ink),marginBottom:16}} onClick={()=>setShowNew(false)}>← رجوع للعقود</button>
        <NewContractPage investors={investors} settings={settings} contracts={contracts.filter(c=>!c.deleted)}
          onSave={c=>{onSaveNew(c);setShowNew(false);}} toast={toast} setInvTxList={setInvTxList}/>
      </div>
    );
  }

  // شاشة التحصيل السريع
  if(showCollect){
    const activeForCollect = contracts.filter(c=>!c.deleted && !doneIds.includes(c.id))
      .map(c=>{
        const paid=_getPaid(payments,c.id);
        const left=Math.max(0,(c.totalInst||0)-paid);
        // المتأخر (مبلغ)
        let lateAmt=0; const inst=c.instAmt||0;
        if(left>0&&inst>0&&c.firstInst){
          const fd=new Date(c.firstInst), nowd=new Date(collectDate);
          let md=(nowd.getFullYear()-fd.getFullYear())*12+(nowd.getMonth()-fd.getMonth());
          if(nowd.getDate()>=fd.getDate()) md+=1;
          if(md<0) md=0;
          lateAmt=Math.min(Math.max(0,md*inst-paid),left);
        }
        return {...c, paid, left, lateAmt};
      })
      .filter(c=>c.left>0)
      .filter(c=>collectInv==="all" || String(c.investorId)===String(collectInv))
      .filter(c=>!collectSearch || c.client.includes(collectSearch) || (c.cPhone||"").includes(collectSearch))
      .sort((a,b)=>b.lateAmt-a.lateAmt);  // المتأخرين فوق

    // سدادات اليوم (التحصيل الحالي)
    const todayPaid = (payments||[]).filter(p=>p.date===collectDate);
    const countToday = new Set(todayPaid.map(p=>p.contractId)).size;
    const sumToday = todayPaid.reduce((s,p)=>s+p.amount,0);

    const doCollect = (c) => {
      const amt = parseFloat(collectAmounts[c.id]!=null?collectAmounts[c.id]:c.instAmt)||0;
      if(amt<=0){toast("⚠️ المبلغ غير صحيح","warn");return;}
      const realAmt = Math.min(amt, c.left);
      const newPaid = c.paid + realAmt;
      setPayments(p=>[...p,{id:Date.now()+Math.floor(Math.random()*1000),contractId:c.id,amount:realAmt,date:collectDate,note:"تحصيل"}]);
      if(newPaid>=(c.totalInst||0)){ markDone(c.id); }
      toast("✅ "+c.client+" — "+SAR(realAmt));
    };

    return (
      <div>
        {!startCollect && <button style={{...styles.btn("#e5e7eb",C.ink),marginBottom:16}} onClick={()=>setShowCollect(false)}>← رجوع للعقود</button>}
        <div style={{...styles.card,marginBottom:16,borderTop:"4px solid "+C.green}}>
          <div style={{fontSize:19,fontWeight:900,marginBottom:12}}>⚡ تحصيل سريع</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>

              <div style={{fontSize:22,fontWeight:900,color:C.teal}}>{countToday} زبون</div>
            </div>
            <div style={{flex:1,minWidth:140,background:"#ecfdf5",borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
              <div style={{fontSize:13,color:C.green,fontWeight:700,marginBottom:2}}>إجمالي المحصّل</div>
              <div style={{fontSize:22,fontWeight:900,color:C.green}}>{SAR(sumToday)}</div>
            </div>
          </div>
        </div>
        <select style={{...styles.select,marginBottom:10}} value={collectInv} onChange={e=>setCollectInv(e.target.value)}>

        </select>

          <div style={{...styles.card,textAlign:"center",color:"#9ca3af",padding:30}}>✅ لا يوجد زبائن عليهم متبقي</div>

              const inv=investors.find(i=>String(i.id)===String(c.investorId));

                <div key={c.id} style={{...styles.card,padding:"12px 14px",borderRight:"5px solid "+(c.lateAmt>0?C.red:C.green)}}>

                    <span>القسط: <b style={{color:C.ink}}>{SAR(c.instAmt||0)}</b></span>
                    <span>المتبقي: <b style={{color:C.red}}>{SAR(c.left)}</b></span>
                    <span>الواصل: <b style={{color:C.green}}>{SAR(c.paid)}</b></span>

  return (

                  const left = Math.max(0,(c.totalInst||0)-paid);
                  // المتأخر = (الأقساط المستحقة حتى اليوم − الأقساط المدفوعة) × قيمة القسط
                  const inst = c.instAmt||0;
                  let lateAmount = 0;
                  if(left>0 && inst>0 && c.firstInst){
                    const fd = new Date(c.firstInst);
                    const nowd = new Date(today2);

                    if(monthsDue<0) monthsDue=0;
                    const dueAmount = monthsDue*inst;           // المفروض دفعه حتى الآن
                    lateAmount = Math.max(0, dueAmount - paid);  // المتأخر = المستحق − المدفوع

                    <td style={styles.td}>{c.note||"—"}</td>
                  </tr>

              </tbody>
              <tfoot>
                <tr style={{background:"#fffbf0",fontWeight:800}}>
                  <td style={styles.td}>الإجمالي</td>
                  <td style={styles.td}>{SAR(invReportContracts.reduce((s,c)=>s+(c.instAmt||0),0))}</td>
                  <td style={styles.td}></td>
                </tr>
              </tfoot>
            </table>
          </div>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:8}}>

      </div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={()=>setStatusTab("active")} style={{...styles.btn(statusTab==="active"?C.teal:"#e5e7eb",statusTab==="active"?"#fff":C.ink),fontSize:15,padding:"6px 14px"}}>
          📋 مستمرة ({activeCount})
        </button>
        <button onClick={()=>setStatusTab("done")} style={{...styles.btn(statusTab==="done"?C.green:"#e5e7eb",statusTab==="done"?"#fff":C.ink),fontSize:15,padding:"6px 14px"}}>

      <Modal open={!!chequeG} onClose={()=>setChequeG(null)} title="📋 العقد - الكفيل">

          <button style={styles.btn(C.gold)} onClick={()=>printContent("cheque-g-print-area")}>🖨️ طباعة</button>

          {contractDoc && <ContractContent c={contractDoc} inv={investors.find(i=>String(i.id)===String(contractDoc.investorId))} r={calcContract(contractDoc.amount,settings)} settings={settings} investors={investors}/>}

    </div>
  );
}

  const save=()=>{
    if(!form.name||!form.amount){return;}
    setPending(p=>[...p,{id:Date.now(),...form,amount:parseFloat(form.amount)}]);
    setForm({name:"",amount:"",date:today,note:""});

  const total = pending.reduce((s,p)=>s+p.amount,0);

  return (
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:16}}>📌 المتبقي من الاستقطاعات</div>

        <KpiCard label="عدد الأشخاص" value={NUM(pending.length)} color={C.teal}/>

        <div style={{padding:"14px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:12}}>
            {[["اسم الشخص / الجهة","name","text","الاسم أو وصف الحوالة"],
              ["المبلغ (ر.س)","amount","number","مثال: 500"],
              ["التاريخ","date","date",""],
              ["ملاحظة","note","text","اختياري"]].map(([l,k,t,p])=>(
              <div key={k}>
                <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>{l}</label>

      {/* Table */}

        <div style={styles.panelHdr}>

        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:15}}>

              ) : pending.map((p,i)=>(

// ─── Loans Page ──────────────────────────────────────────────
function LoansPage({loans, setLoans}) {
  const today = new Date().toISOString().split("T")[0];
  const MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const [form,setForm]=useState({name:"",amount:"",monthly:"",date:today,note:""});
  const [selLoan,setSelLoan]=useState(null);
  const [payForm,setPayForm]=useState({amount:"",date:today,note:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=()=>{
    if(!form.name||!form.amount){return;}
    setLoans(p=>[...p,{id:Date.now(),...form,amount:parseFloat(form.amount),monthly:parseFloat(form.monthly)||0,payments:[]}]);
    setForm({name:"",amount:"",monthly:"",date:today,note:""});
  };

  const addPayment=(loan)=>{
    if(!payForm.amount){return;}
    const updated = {...loan, payments:[...(loan.payments||[]),{id:Date.now(),date:payForm.date,amount:parseFloat(payForm.amount),note:payForm.note}]};
    setLoans(p=>p.map(l=>l.id===loan.id?updated:l));
    setPayForm({amount:"",date:today,note:""});
    setSelLoan(null);
  };

  const totalOut = loans.reduce((s,l)=>{
    const paid = (l.payments||[]).reduce((ss,p)=>ss+p.amount,0);
    return s + Math.max(0, l.amount - paid);
  },0);
  const totalPaid = loans.reduce((s,l)=>(l.payments||[]).reduce((ss,p)=>ss+p.amount,0)+s,0);

  return (
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:16}}>🤝 السلف</div>

      {/* Summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:20}}>
        <KpiCard label="إجمالي المتبقي" value={SAR(totalOut)} color={C.red}/>
        <KpiCard label="إجمالي المدفوع" value={SAR(totalPaid)} color={C.green}/>
        <KpiCard label="عدد السلف" value={NUM(loans.length)} color={C.teal}/>
      </div>

      {/* Add loan */}
      <div style={{...styles.panel,marginBottom:16}}>
        <div style={styles.panelHdr}><h3 style={{margin:0,fontSize:15,fontWeight:700}}>➕ تسجيل سلفة جديدة</h3></div>
        <div style={{padding:"14px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:12}}>
            {[["اسم الشخص","name","text","اسم المقترض"],["المبلغ الكلي (ر.س)","amount","number","مثال: 5000"],["القسط الشهري المقترح","monthly","number","مثال: 500"],["التاريخ","date","date",""],["ملاحظة","note","text","اختياري"]].map(([l,k,t,p])=>(
              <div key={k}>
                <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>{l}</label>
                <input style={styles.input} type={t} placeholder={p} value={form[k]} onChange={e=>set(k,e.target.value)}/>
              </div>
            ))}
          </div>
          <button style={styles.btn(C.teal)} onClick={save}>💾 تسجيل السلفة</button>
        </div>
      </div>

      {/* Loans list */}
      <div>
        {loans.length===0 ? (
          <div style={{...styles.panel,padding:40,textAlign:"center",color:"#9ca3af"}}>لا توجد سلف مسجلة</div>
        ) : loans.map(l=>{
          const paid = (l.payments||[]).reduce((s,p)=>s+p.amount,0);
          const remaining = Math.max(0, l.amount - paid);
          const pct = l.amount>0 ? Math.min(100, Math.round(paid/l.amount*100)) : 0;
          return (
            <div key={l.id} style={{...styles.panel,marginBottom:16}}>
              <div style={{padding:"14px 18px"}}>
                {/* Header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:17,color:C.ink,marginBottom:4}}>{l.name}</div>
                    <div style={{fontSize:14,color:"#9ca3af"}}>{l.date} {l.note?"| "+l.note:""}</div>
                  </div>
                  <button style={{...styles.btn(C.red),fontSize:14,padding:"4px 10px"}}
                    onClick={()=>setLoans(p=>p.filter(x=>x.id!==l.id))}>🗑️</button>
                </div>
                {/* Progress */}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:15,marginBottom:6}}>
                  <span style={{color:"#555"}}>المبلغ الكلي: <strong>{SAR(l.amount)}</strong></span>
                  <span style={{color:C.green}}>مدفوع: <strong>{SAR(paid)}</strong></span>
                  <span style={{color:remaining>0?C.red:C.green}}>متبقي: <strong>{SAR(remaining)}</strong></span>
                </div>
                <div style={{background:"#f0f0f0",borderRadius:99,height:8,marginBottom:8}}>
                  <div style={{background:C.green,borderRadius:99,height:8,width:pct+"%",transition:"width 0.3s"}}></div>
                </div>
                {l.monthly>0 && <div style={{fontSize:14,color:"#9ca3af",marginBottom:10}}>القسط المقترح: {SAR(l.monthly)} / شهر</div>}
                {/* Payments history */}
                {(l.payments||[]).length>0 && (
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>سجل الدفعات:</div>
                    {(l.payments||[]).map(p=>{
                      const d = new Date(p.date);
                      const monthName = MONTHS[d.getMonth()]+" "+d.getFullYear();
                      return (
                        <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f0f0f0",fontSize:15}}>
                          <span style={{color:"#555"}}>{monthName} — {p.date}{p.note?" | "+p.note:""}</span>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{color:C.green,fontWeight:700}}>+{SAR(p.amount)}</span>
                            <button style={{...styles.btn(C.red),fontSize:13,padding:"2px 7px"}}
                              onClick={()=>setLoans(prev=>prev.map(x=>x.id===l.id?{...x,payments:(x.payments||[]).filter(pp=>pp.id!==p.id)}:x))}>🗑️</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {/* Add payment */}
                {selLoan===l.id ? (
                  <div style={{background:"#f8f8f8",borderRadius:10,padding:12}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                      <div>
                        <label style={{fontSize:14,fontWeight:700,color:C.ink2,display:"block",marginBottom:4}}>المبلغ</label>
                        <input style={styles.input} type="number" placeholder={l.monthly||"المبلغ"} value={payForm.amount} onChange={e=>setPayForm(f=>({...f,amount:e.target.value}))}/>
                      </div>
                      <div>
                        <label style={{fontSize:14,fontWeight:700,color:C.ink2,display:"block",marginBottom:4}}>التاريخ</label>
                        <input style={styles.input} type="date" value={payForm.date} onChange={e=>setPayForm(f=>({...f,date:e.target.value}))}/>
                      </div>
                      <div>
                        <label style={{fontSize:14,fontWeight:700,color:C.ink2,display:"block",marginBottom:4}}>ملاحظة</label>
                        <input style={styles.input} type="text" placeholder="اختياري" value={payForm.note} onChange={e=>setPayForm(f=>({...f,note:e.target.value}))}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button style={styles.btn(C.teal)} onClick={()=>addPayment(l)}>💾 حفظ الدفعة</button>
                      <button style={styles.btn("#e5e7eb",C.ink)} onClick={()=>setSelLoan(null)}>إلغاء</button>
                    </div>
                  </div>
                ) : remaining>0 ? (
                  <button style={styles.btn(C.teal)} onClick={()=>{setSelLoan(l.id);setPayForm({amount:l.monthly||"",date:today,note:""});}}>
                    💰 تسجيل دفعة
                  </button>
                ) : (
                  <div style={{color:C.green,fontWeight:700,fontSize:15}}>✅ تم السداد الكامل</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

    </div>
  );
}

// ─── Zakat Page ───────────────────────────────────────────────
function ZakatPage({investors, contracts, settings, zakatTx, setZakatTx}) {
  const today = new Date().toISOString().split("T")[0];
  const [form,setForm]=useState({type:"collect",amount:"",name:"",date:today,note:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const totalIn  = zakatTx.filter(t=>t.type==="collect").reduce((s,t)=>s+t.amount,0);
  const totalOut = zakatTx.filter(t=>t.type==="pay").reduce((s,t)=>s+t.amount,0);
  const balance  = totalIn - totalOut;

  const save=()=>{
    if(!form.amount){return;}
    setZakatTx(p=>[...p,{id:Date.now(),...form,amount:parseFloat(form.amount)}]);
    setForm({type:form.type,amount:"",name:"",date:today,note:""});

  return (
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:16}}>🌙 صندوق الزكاة</div>

        <KpiCard label="إجمالي المجموع" value={SAR(totalIn)} color={C.green}/>
        <KpiCard label="إجمالي الصرف" value={SAR(totalOut)} color={C.red}/>
        <KpiCard label="✅ الرصيد المتبقي" value={SAR(balance)} color={balance>=0?C.teal:C.red}/>
      </div>

      {/* Add transaction */}
      <div style={{...styles.panel,marginBottom:16}}>
        <div style={styles.panelHdr}><h3 style={{margin:0,fontSize:15,fontWeight:700}}>➕ تسجيل حركة زكاة</h3></div>
        <div style={{padding:"14px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>النوع</label>
              <select style={styles.select} value={form.type} onChange={e=>set("type",e.target.value)}>
                <option value="collect">جمع زكاة من مستثمر</option>
                <option value="pay">صرف زكاة لمستحق</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>
                {form.type==="collect"?"اسم المستثمر":"اسم المستحق"}
              </label>
              <input style={styles.input} type="text" placeholder="الاسم"
                value={form.name} onChange={e=>set("name",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>المبلغ (ر.س)</label>

function AccountsPage({contracts, investors, setInvestors, settings, txList, setTxList, loans, setLoans, zakatTx, setZakatTx, pending, setPending, payments, toast}) {
  const [subTab, setSubTab] = useState("inv");
  const [selInv, setSelInv] = useState(investors[0]?.id||null);
  const [invSubTab, setInvSubTab] = useState("inv");
  const [form, setForm] = useState({type:"deposit", amount:"", note:"", date:new Date().toISOString().split("T")[0]});
  const set = (k,v) => {
    setForm(f=>({...f,[k]:v}));
    // Auto-fill if idNum entered and matches existing contract
    if(k==="idNum" && v.length>=9){
      const prev = contracts.find(c=>c.idNum===v);
      if(prev){
        setForm(f=>({...f, idNum:v, client:prev.client||f.client, job:prev.job||f.job, cPhone:prev.cPhone||f.cPhone}));
        toast("✅ تم تعبئة بيانات العميل تلقائياً");
      }
    }
  };

  const inv = investors.find(i=>i.id===selInv);
  const myTx = (txList[selInv]||[]);

  // Auto-transactions from contracts
  const myContracts = contracts.filter(c=>c.investorId===selInv);
  const autoTx = myContracts.map(c=>{
    const r = calcContract(c.amount, settings);
    // ينخصم: قيمة العقد النقدية + عمولة المحاسبين + نصيب المؤسسة + الرسوم الإدارية
    const deduct = c.amount + r.acc + r.inst + r.admin;
    return {
      id:"auto_"+c.id, date:c.date, auto:true,
      type:"contract",
      amount:-deduct,
      note:c.client,
      breakdown:"نقدي: "+SAR(c.amount)+" | محاسبين: "+SAR(r.acc)+" | مؤسسة: "+SAR(r.inst)+" | رسوم: "+SAR(r.admin),
      admin:r.admin, acc:r.acc, inst:r.inst, net:r.net
    };
  });

  // Auto payments grouped by month
  const paysByMonth = {};
  (payments||[]).forEach(p=>{
    const c = myContracts.find(x=>x.id===p.contractId);
    if(!c) return;
    const d = new Date(p.date);
    const ym = fiscalYM(d);
    if(!paysByMonth[ym]) paysByMonth[ym]={amount:0, count:0, date:ym+"-01"};
    paysByMonth[ym].amount += p.amount;
    paysByMonth[ym].count  += 1;
  });
  const mNames=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const autoPayments = Object.entries(paysByMonth).map(([ym,v])=>{
    const [y,m]=ym.split("-");
    return {
      id:"pay_"+ym, date:v.date, auto:true,
      type:"installments",
      amount:v.amount,
      note:"أقساط "+mNames[parseInt(m)-1]+" "+y+" ("+v.count+" قسط)"
    };
  });

  // Merge and sort all transactions
  const allTx = [...autoTx, ...autoPayments, ...myTx].sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Running balance
  let balance = inv?.capital || 0;
  const rows = allTx.map(tx=>{
    balance += tx.amount;
    return {...tx, balance};
  });

  const addTx = () => {
    if(!form.amount||!form.date){return;}
    const txType = TX_TYPES.find(t=>t.key===form.type);
    const amt = parseFloat(form.amount) * txType.sign;
    const newTx = {id:Date.now(), date:form.date, type:form.type,
      amount:amt, note:form.note||txType.label};
    setTxList(p=>({...p,[selInv]:[...(p[selInv]||[]), newTx]}));
    setForm(f=>({...f, amount:"", note:""}));
  };

  const delTx = (id) => setTxList(p=>({...p,[selInv]:(p[selInv]||[]).filter(t=>t.id!==id)}));

  const finalBalance = rows.length>0 ? rows[rows.length-1].balance : (inv?.capital||0);
  const totalDeposits = allTx.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const totalWithdraws = allTx.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);

  const subTabs = [
    {key:"list",  label:"👥 المستثمرون"},
    {key:"inv",   label:"💰 الحسابات"},
    {key:"comm",  label:"📑 العمولات"},
    {key:"deduct",label:"🏦 الاستقطاعات"},
  ];

  return (
    <div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:16}}>💰 الحسابات</div>

      {/* Sub tabs */}
      <div style={{display:"flex",gap:0,marginBottom:20,background:C.white,borderRadius:10,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",width:"fit-content"}}>
        {subTabs.map(t=>(
          <button key={t.key} onClick={()=>setSubTab(t.key)}

          <option value="loans">🤝 السلف</option>
          <option value="zakat">🌙 صندوق الزكاة</option>
          <option value="pending">📌 المتبقي</option>
        </select>
        {invSubTab==="inv" && inv && (
          <div style={{display:"flex",gap:12,marginRight:"auto",flexWrap:"wrap"}}>
            <div style={{textAlign:"center",background:C.tealLt,borderRadius:8,padding:"6px 14px"}}>
              <div style={{fontSize:13,color:"#555",marginBottom:2}}>رأس المال</div>
              <div style={{fontSize:16,fontWeight:800,color:C.teal}}>{SAR(inv.capital||0)}</div>
            </div>
            <div style={{textAlign:"center",background:C.greenLt,borderRadius:8,padding:"6px 14px"}}>
              <div style={{fontSize:13,color:"#555",marginBottom:2}}>الرصيد الحالي</div>
              <div style={{fontSize:16,fontWeight:800,color:C.green}}>{SAR(finalBalance)}</div>
            </div>
            <div style={{textAlign:"center",background:finalBalance>=0?C.greenLt:C.redLt,borderRadius:8,padding:"6px 14px"}}>
              <div style={{fontSize:13,color:"#555",marginBottom:2}}>الفرق</div>
              <div style={{fontSize:16,fontWeight:800,color:finalBalance>=(inv?.capital||0)?C.green:C.red}}>
                {SAR(finalBalance-(inv?.capital||0))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Add transaction */}
      <div style={{...styles.panel,marginBottom:16}}>
        <div style={styles.panelHdr}><h3 style={{margin:0,fontSize:15,fontWeight:700}}>➕ إضافة حركة</h3></div>
        <div style={{padding:"14px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>نوع الحركة</label>
              <select style={styles.select} value={form.type} onChange={e=>set("type",e.target.value)}>
                {TX_TYPES.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>المبلغ (ر.س)</label>
              <input style={{...styles.input,borderColor:C.teal,fontWeight:700}} type="number"
                placeholder="أدخل المبلغ" value={form.amount} onChange={e=>set("amount",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>التاريخ</label>
              <input style={styles.input} type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>ملاحظة</label>
              <input style={styles.input} type="text" placeholder="اختياري"
                value={form.note} onChange={e=>set("note",e.target.value)}/>
            </div>
          </div>
          <button style={styles.btn(C.teal)} onClick={addTx}>💾 إضافة</button>
        </div>
      </div>

      {/* Transactions table */}
      <div style={styles.panel}>
        <div style={styles.panelHdr}>
          <h3 style={{margin:0,fontSize:15,fontWeight:700}}>
            📋 كشف حساب — {inv?.name||""}
          </h3>
          <div style={{display:"flex",gap:10,fontSize:15}}>
            <span style={{color:C.green,fontWeight:700}}>إجمالي الإيداعات: {SAR(totalDeposits)}</span>
            <span style={{color:C.red,fontWeight:700}}>إجمالي الخصومات: {SAR(totalWithdraws)}</span>
          </div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:15}}>
            <thead>
              <tr>
                {["التاريخ","نوع الحركة","البيان","إيداع","خصم","الرصيد",""].map(h=>(
                  <th key={h} style={styles.th}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {/* Opening balance row */}
              <tr style={{background:"#f0fdf4"}}>
                <td style={{...styles.td,fontSize:14,color:"#888"}}>{inv?.date||"—"}</td>
                <td style={styles.td}><span style={{...styles.badge(C.tealLt,C.teal)}}>رصيد افتتاحي</span></td>
                <td style={styles.td}>رأس المال المبدئي</td>
                <td style={{...styles.td,color:C.green,fontWeight:700}}>{SAR(inv?.capital||0)}</td>
                <td style={styles.td}>—</td>
                <td style={{...styles.td,fontWeight:800,color:C.teal}}>{SAR(inv?.capital||0)}</td>
                <td style={styles.td}></td>
              </tr>
              {rows.map((tx,i)=>{
                const txType = TX_TYPES.find(t=>t.key===tx.type)||TX_TYPES[0];
                const isPos = tx.amount>0;
                return (
                  <tr key={tx.id} style={{background:i%2===0?C.white:C.gray}}>
                    <td style={{...styles.td,fontSize:14,color:"#666"}}>{tx.date}</td>
                    <td style={styles.td}>
                      <span style={{...styles.badge(txType.color+"22",txType.color)}}>{txType.label}</span>
                    </td>
                    <td style={styles.td}>
                      <div>{tx.note||"—"}</div>
                      
                    </td>
                    <td style={{...styles.td,color:C.green,fontWeight:isPos?700:400}}>
                      {isPos ? SAR(tx.amount) : "—"}
                    </td>
                    <td style={{...styles.td,color:C.red,fontWeight:!isPos?700:400}}>
                      {!isPos ? SAR(Math.abs(tx.amount)) : "—"}
                    </td>
                    <td style={{...styles.td,fontWeight:800,color:tx.balance>=0?C.teal:C.red}}>
                      {SAR(tx.balance)}
                    </td>
                    <td style={styles.td}>
                      {!tx.auto && (
                        <button style={{...styles.btn(C.red),fontSize:13,padding:"3px 8px"}}
                          onClick={()=>delTx(tx.id)}>🗑️</button>
                      )}
                      {tx.auto && <span style={{fontSize:13,color:"#9ca3af"}}>تلقائي</span>}
                    </td>
                  </tr>
                );
              })}
              {rows.length===0 && (
                <tr><td colSpan={7} style={{...styles.td,textAlign:"center",padding:40,color:"#9ca3af"}}>
                  لا توجد حركات — ابدأ بإضافة حركة
                </td></tr>
              )}
            </tbody>
            {rows.length>0 && (
              <tfoot>
                <tr style={{background:C.goldLt}}>
                  <td colSpan={3} style={{...styles.td,fontWeight:800}}>الرصيد النهائي</td>
                  <td style={{...styles.td,color:C.green,fontWeight:800}}>{SAR(totalDeposits+(inv?.capital||0))}</td>
                  <td style={{...styles.td,color:C.red,fontWeight:800}}>{SAR(totalWithdraws)}</td>
                  <td style={{...styles.td,fontWeight:900,fontSize:16,color:finalBalance>=0?C.teal:C.red}}>{SAR(finalBalance)}</td>
                  <td style={styles.td}></td>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      </div>
      </>}
    </div>
  );
}

// ─── Monthly Jard ────────────────────────────────────────────
function JardPage({contracts,investors,settings,txList,loans,zakatTx,pending,payments,gsWrite}) {
  const today = new Date();
  const currentYM = fiscalYM(today);
  const months = [...new Set(contracts.map(c=>fiscalYM(c.date)))].sort().reverse();
  if(!months.includes(currentYM)) months.unshift(currentYM);
  const [selMonth,setSelMonth]=useState(months[0]);
  const [overrides,setOverrides]=useState(()=>{try{return JSON.parse(localStorage.getItem("qimma_jard_ov")||"{}");}catch{return {};}});

  const mLabel=ym=>{const[y,m]=ym.split("-");return"شهر "+parseInt(m)+" - "+y;};
  const mc = contracts.filter(c=>fiscalYM(c.date)===selMonth);

  // Goods data for cards balance
  const goodsData = (() => {
    try{ return JSON.parse(localStorage.getItem("qimma_goods3")||"[]"); }catch{ return []; }
  })();
  const priceOv = (() => {
    try{ return JSON.parse(localStorage.getItem("qimma_price_ov")||"{}"); }catch{ return {}; }
  })();

  const getVal = (key) => {
    // البطاقات والزكاة والاستقطاعات: تلقائية دائماً (تتجاهل أي قيمة يدوية قديمة)
    const alwaysAuto = ["cards","zakat","deductions"];
    if(!alwaysAuto.includes(key) && overrides[selMonth+"_"+key]!==undefined) return overrides[selMonth+"_"+key];
    // سحب تلقائي من الصفحات المرتبطة
    if(key==="loans") {
      return (loans||[]).reduce((s,l)=>{
        const paid=(l.payments||[]).reduce((ss,p)=>ss+p.amount,0);
        return s+Math.max(0,(l.amount||0)-paid);
      },0);
    }
    if(key==="zakat")   return (zakatTx||[]).reduce((s,t)=>s+(t.type==="collect"?t.amount:-t.amount),0);
    if(key==="deductions") return (pending||[]).reduce((s,p)=>s+p.amount,0);
    if(key==="cards") {
      // Match GoodsPage calculation exactly
      const cRows = contracts.map(c=>({
        id:"c_"+c.id, date:c.date,
        supportClient:c.deductEnabled?(parseFloat(c.deductAmount)||0):0,
        supportAcc:0,
        withdrawnQty:parseInt(c.qty)||0,
        price:parseFloat(priceOv["c_"+c.id])||0,
      }));
      const allR = [...cRows,...goodsData].sort((a,b)=>new Date(a.date)-new Date(b.date)||String(a.id).localeCompare(String(b.id)));
      let runCards=0; let lastPrice2=0; let lastCash2=0;
      allR.forEach(r=>{
        const rowPrice=parseFloat(priceOv[r.id]||r.price)||lastPrice2||1;
        if(rowPrice) lastPrice2=rowPrice;
        const supC=parseFloat(r.supportClient)||0;
        const supA=parseFloat(r.supportAcc)||0;
        const supported=supC||supA?Math.floor((supC+supA)/rowPrice):0;
        const withdrawn=parseInt(r.withdrawnQty)||0;
        runCards=runCards+supported-withdrawn;
        lastCash2=runCards*rowPrice;
      });
      return lastCash2;
    }
    return 0;
  };
  const setVal = (key,v) => setOverrides(p=>{
    const newOv={...p,[selMonth+"_"+key]:parseFloat(v)||0};
    localStorage.setItem("qimma_jard_ov",JSON.stringify(newOv));
    gsWrite("jard_ov",newOv);
    return newOv;
  });
  const getInv = (id) => {
    const key = selMonth+"_inv_"+id;
    if(overrides[key]!==undefined) return overrides[key];
    const inv = investors.find(i=>i.id===id);
    const capital = inv?.capital||0;
    const myContracts = contracts.filter(c=>c.investorId===id);
    const myManualTx = (txList[id]||[]);
    const autoDeduct = myContracts.reduce((s,c)=>{
      const r=calcContract(c.amount,settings);
      return s-(c.amount+r.acc+r.inst+r.admin);
    },0);
    const autoPaid = (payments||[]).filter(p=>myContracts.find(c=>c.id===p.contractId)).reduce((s,p)=>s+p.amount,0);
    const manualTotal = myManualTx.reduce((s,t)=>s+t.amount,0);
    return capital + autoDeduct + autoPaid + manualTotal;
  };
  const setInv = (id,sign,v) => {
    const key = selMonth+"_inv_"+id;
    setOverrides(p=>{
      const newOv={...p,[key]: sign===1 ? (parseFloat(v)||0) : -(parseFloat(v)||0)};
      localStorage.setItem("qimma_jard_ov",JSON.stringify(newOv));
      gsWrite("jard_ov",newOv);
      return newOv;
    });
  };

  // مع المستثمرين (خصوم)
  const invRows = [
    {key:"cards",      name:"رصيد البطاقات",           sign:1,  hint:"قيمة البضاعة الموجودة"},
    {key:"zakat",      name:"صندوق الزكاة",            sign:1,  hint:"الزكاة المجمّعة"},
    {key:"deductions", name:"المتبقي من الاستقطاعات",  sign:1,  hint:"أرصدة معلقة مجهولة"},
  ];
  // الأصول
  const otherRows = [
    {key:"cash",       name:"الرصيد النقدي",           sign:1,  hint:"الكاش الفعلي بالمؤسسة"},
    {key:"accounts",   name:"رصيد الحسابات البنكية",   sign:1,  hint:"إجمالي الحسابات البنكية"},
    {key:"loans",      name:"السلف",                   sign:1,  hint:"مبالغ أسلفتها لأشخاص"},
  ];

  // calc totals with correct signs
  let totalMojab = 0, totalSalib = 0;
  investors.forEach(inv=>{
    const v = getInv(inv.id);
    if(v>0) totalMojab+=v; else totalSalib+=Math.abs(v);
  });
  invRows.forEach(r=>{
    const v = getVal(r.key)||0;
    if(r.sign===1) totalMojab+=v; else totalSalib+=v;
  });
  otherRows.forEach(r=>{
    const v = getVal(r.key)||0;
    if(r.sign===1) totalMojab+=v; else totalSalib+=v;
  });
  const farq = totalMojab - totalSalib;

  const thS = {...styles.th, padding:"10px 14px"};
  const tdS = {...styles.td, padding:"9px 12px", verticalAlign:"middle"};
  const inpS = (color)=>({...styles.input,width:"100%",maxWidth:130,textAlign:"center",borderColor:color,color,fontWeight:700,padding:"6px 8px",fontSize:15});
  // مربع للعرض فقط (شكل جمالي مثل المربعات بدون إمكانية الكتابة)
  const boxRO = (color)=>({display:"inline-block",width:"100%",maxWidth:130,textAlign:"center",border:"1.5px solid "+color,borderRadius:8,color,fontWeight:800,padding:"7px 8px",fontSize:15,background:"#fafafa"});

  const Row = ({name,mojab,salib,onMojab,onSalib,auto,isInv,hint,i,autoSalib,hideMojab}) => (
    <tr style={{background:i%2===0?C.white:C.gray}}>
      <td style={tdS}>
        <span style={{fontWeight:700}}>{name}</span>
        {hint && <div style={{fontSize:13,color:"#9ca3af",marginTop:2}}>{hint}</div>}
        {isInv && <div style={{fontSize:13,color:"#9ca3af",marginTop:2}}>رصيد الحساب الجاري</div>}
      </td>
      <td style={{...tdS,textAlign:"center"}}>
        {auto
          ? <span style={boxRO(C.green)}>{mojab?Number(mojab).toLocaleString("ar-SA"):"٠"}</span>
          : (!hideMojab && <input type="number" value={mojab||""} onChange={e=>onMojab(e.target.value)}
              placeholder="0" style={inpS(C.green)}/>)}
      </td>
      <td style={{...tdS,textAlign:"center"}}>
        {(autoSalib||auto)
          ? <span style={boxRO(C.red)}>{salib?Number(salib).toLocaleString("ar-SA"):"٠"}</span>
          : <input type="number" value={salib||""} onChange={e=>onSalib(e.target.value)}
              placeholder="0" style={inpS(C.red)}/>
        }
      </td>
    </tr>
  );

  return (
    <div>
      {/* Month + header */}
      <div style={{...styles.card,display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <label style={{fontWeight:700,fontSize:15,whiteSpace:"nowrap"}}>شهر الجرد:</label>
        <select style={{...styles.select,width:"auto",minWidth:160,borderColor:C.teal,color:C.teal,fontWeight:700,background:C.tealLt}}
          value={selMonth} onChange={e=>setSelMonth(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{mLabel(m)}</option>)}
        </select>
        <button style={{...styles.btn(C.gold),marginRight:"auto"}} onClick={()=>window.print()}>🖨️ طباعة</button>
      </div>

      <div style={styles.panel}>
        {/* Panel header with totals */}
        <div style={{background:"#1e2235",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div style={{color:"white",fontWeight:900,fontSize:17}}>📊 الجرد — {mLabel(selMonth)}</div>
          <div style={{display:"flex",gap:16,alignItems:"center"}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:2}}>الموجب</div>
              <div style={{fontSize:18,fontWeight:900,color:"#5cd98a"}}>{totalMojab.toLocaleString("ar-SA")}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:2}}>السالب</div>
              <div style={{fontSize:18,fontWeight:900,color:"#ff8080"}}>{totalSalib.toLocaleString("ar-SA")}</div>
            </div>
            <div style={{background:farq>=0?"rgba(92,217,138,0.2)":"rgba(255,128,128,0.2)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:2}}>الفرق</div>
              <div style={{fontSize:22,fontWeight:900,color:farq>=0?"#5cd98a":"#ff8080"}}>
                {farq>=0?"":"-"}{Math.abs(farq).toLocaleString("ar-SA")}
              </div>
              <div style={{fontSize:13,color:farq>=0?"#5cd98a":"#ff8080"}}>{farq>=0?"✅ موجب":"⚠️ سالب"}</div>
            </div>
          </div>
        </div>

        {/* Single unified table */}
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:15}}>
            <thead>
              <tr>
                <th style={{...thS,width:"45%",textAlign:"right"}}>البند</th>
                <th style={{...thS,color:"#a8f0c6",textAlign:"center"}}>الموجب ✏️</th>
                <th style={{...thS,color:"#ff9999",textAlign:"center"}}>السالب ✏️</th>
              </tr>
            </thead>
            <tbody>
              {/* Section: أرصدة المستثمرين */}
              <tr>
                <td colSpan={3} style={{background:C.tealLt,color:C.teal,fontWeight:800,fontSize:15,padding:"8px 14px",borderRight:"4px solid "+C.teal}}>
                  أرصدة المستثمرين
                </td>
              </tr>
              {investors.map((inv,i)=>{
                const cur = getInv(inv.id);
                const mojab = cur>0?cur:0;
                const salib = cur<0?Math.abs(cur):0;
                return <Row key={inv.id} i={i} name={inv.name} mojab={mojab||""} salib={salib||""} auto={true} isInv
                  onMojab={()=>{}}
                  onSalib={()=>{}}/>;
              })}

              {/* invRows مع المستثمرين - كلها تلقائية للعرض فقط */}
              {invRows.map((row,i)=>{
                const v = getVal(row.key);
                return <Row key={row.key} i={i} name={row.name} hint={row.hint}
                  mojab={v>=0?v:""} salib={v<0?Math.abs(v):""}
                  onMojab={()=>{}} onSalib={()=>{}}
                  auto={true} hideMojab={false}/>;
              })}

              {/* Section: الأصول */}
              <tr>
                <td colSpan={3} style={{background:"#e8f5e9",color:"#1b5e20",fontWeight:800,fontSize:15,padding:"8px 14px",borderRight:"4px solid #4caf50"}}>
                  الأصول
                </td>
              </tr>
              {otherRows.map((row,i)=>{
                const v = getVal(row.key);
                const isAuto = row.key==="loans";
                if(isAuto){
                  // السلف: ثابتة في خانة السالب فقط (تلقائية)
                  return <Row key={row.key} i={i} name={row.name} hint={row.hint}
                    mojab={""} salib={Math.abs(v)}
                    onMojab={()=>{}} onSalib={()=>{}}
                    autoSalib={true} hideMojab={true}/>;
                }
                return <Row key={row.key} i={i} name={row.name} hint={row.hint}
                  mojab={v>=0?v:""}
                  salib={v<0?Math.abs(v):""}
                  onMojab={v2=>setVal(row.key,parseFloat(v2)||0)}
                  onSalib={v2=>setVal(row.key,-(parseFloat(v2)||0))}/>;
              })}

              {/* Total row */}
              <tr style={{background:"#1e2235"}}>
                <td style={{...tdS,color:"white",fontWeight:800}}>المجموع</td>
                <td style={{...tdS,textAlign:"center",color:"#5cd98a",fontWeight:900,fontSize:17}}>{totalMojab.toLocaleString("ar-SA")}</td>
                <td style={{...tdS,textAlign:"center",color:"#ff8080",fontWeight:900,fontSize:17}}>{totalSalib.toLocaleString("ar-SA")}</td>
              </tr>
              <tr style={{background:farq>=0?"#e3f5ec":C.redLt}}>
                <td style={{...tdS,fontWeight:800,color:farq>=0?C.green:C.red}}>الفرق</td>
                <td colSpan={2} style={{...tdS,textAlign:"center",fontWeight:900,fontSize:20,color:farq>=0?C.green:C.red}}>
                  {farq>=0?"":"-"}{Math.abs(farq).toLocaleString("ar-SA")} ريال &nbsp;
                  {farq>=0?"✅":"⚠️"}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

  const tot=mc.reduce((a,c)=>{const r=calcContract(c.amount,settings);return{amt:a.amt+c.amount,profit:a.profit+r.profit,admin:a.admin+r.admin,acc:a.acc+r.acc,inst:a.inst+r.inst,net:a.net+r.net};},{amt:0,profit:0,admin:0,acc:0,inst:0,net:0});

      <div style={{...styles.card,display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>

        <KpiCard label="أرباح العقود" value={SAR(tot.profit)}/>
        <KpiCard label="نصيب المدير 10%" value={SAR(tot.inst)}/>
        <KpiCard label="نصيب المحاسب 10%" value={SAR(tot.acc)}/>
        <KpiCard label="صافي المستثمرين" value={SAR(tot.net)}/>
        <KpiCard label="عدد العقود" value={NUM(mc.length)}/>

        <div style={styles.panel}>

          <div style={{padding:"14px 18px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
            {[...new Set(investors.map(i=>i.fund))].map(fund=>{
              const cap=investors.filter(i=>i.fund===fund).reduce((s,i)=>s+i.capital,0);
              const fNet=mc.filter(c=>(investors.find(i=>String(i.id)===String(c.investorId))?.fund)===fund).reduce((s,c)=>s+calcContract(c.amount,settings).net,0);

                <input style={styles.input} type={t} value={editFund.form[k]} onChange={e=>setEditFund(f=>({...f,form:{...f.form,[k]:e.target.value}}))}/>

              <button style={styles.btn(C.teal)} onClick={()=>{
                setInvestors(p=>p.map(i=>i.id===editFund.inv.id?{...i,...editFund.form,capital:parseFloat(editFund.form.capital)||0}:i));
                setEditFund(null);
              }}>💾 حفظ</button>
              <button style={styles.btn(C.red)} onClick={()=>{
                if(confirm("حذف هذا المستثمر نهائياً؟")){
                  setInvestors(p=>p.filter(i=>i.id!==editFund.inv.id));
                  setEditFund(null);
                }
              }}>🗑️ حذف</button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

const DAILY_TYPES = [
  {key:"sadad",   label:"سداد",          sign:1,  color:"#16a34a"},
  {key:"masroof", label:"مصروف",         sign:-1, color:"#dc2626"},
  {key:"sahb",    label:"سحب",           sign:-1, color:"#ea580c"},
  {key:"estilam", label:"استلمت نقدي",   sign:-1, color:"#7c3aed"},
  {key:"mgr",     label:"استلام مدير",   sign:-1, color:"#b45309"},
  {key:"acc",     label:"استلام محاسب",  sign:-1, color:"#0891b2"},
];
function DailyPage({daily, setDaily, dailyOpen, setDailyOpen, contracts, settings, toast}) {
  const today = new Date().toISOString().split("T")[0];
  const [selDay,setSelDay] = useState(today);
  const [form,setForm] = useState({type:"sadad", amount:"", desc:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  // حركات اليوم المحدد
  const dayRows = (Array.isArray(daily)?daily:[]).filter(d=>d.date===selDay).sort((a,b)=>a.id-b.id);

  // حساب الرصيد الافتتاحي: متبقي اليوم السابق (تراكمي من كل الأيام قبله)
  const _daily = Array.isArray(daily) ? daily : [];
  const _dailyOpen = (dailyOpen && typeof dailyOpen==="object" && !Array.isArray(dailyOpen)) ? dailyOpen : {};
  const prevDays = _daily.filter(d=>d.date < selDay);
  const manualOpen = _dailyOpen[selDay];
  // الرصيد الافتتاحي = (رصيد افتتاحي يدوي لأول يوم) + صافي كل الحركات قبل هذا اليوم
  const firstOpenKey = Object.keys(_dailyOpen).sort()[0];
  const baseOpen = firstOpenKey ? (_dailyOpen[firstOpenKey]||0) : 0;
  const baseDate = firstOpenKey || "0000-00-00";
  const prevNet = _daily.filter(d=>d.date < selDay && d.date >= baseDate)
    .reduce((s,d)=>{const t=DAILY_TYPES.find(x=>x.key===d.type);return s+(t?t.sign:1)*(d.amount||0);},0);
  const openingBalance = baseOpen + prevNet;

  // صافي حركات اليوم
  const dayNet = dayRows.reduce((s,d)=>{const t=DAILY_TYPES.find(x=>x.key===d.type);return s+(t?t.sign:1)*(d.amount||0);},0);
  const closingBalance = openingBalance + dayNet;

  // إجماليات حسب النوع لهذا اليوم
  const sumByType = (k)=>dayRows.filter(d=>d.type===k).reduce((s,d)=>s+(d.amount||0),0);

  // نصيب المدير والمحاسب من عقود هذا اليوم
  const dayContracts = contracts.filter(c=>c.date===selDay);
  const mgrShare = dayContracts.reduce((s,c)=>s+calcContract(c.amount,settings).inst,0);
  const accShare = dayContracts.reduce((s,c)=>s+calcContract(c.amount,settings).acc,0);

  // الحساب الكامل: المستحق من كل العقود - المستلم من اليومية
  const mgrEarnedAll = contracts.reduce((s,c)=>s+calcContract(c.amount,settings).inst,0);
  const accEarnedAll = contracts.reduce((s,c)=>s+calcContract(c.amount,settings).acc,0);
  const mgrTakenAll = _daily.filter(d=>d.type==="mgr").reduce((s,d)=>s+(d.amount||0),0);
  const accTakenAll = _daily.filter(d=>d.type==="acc").reduce((s,d)=>s+(d.amount||0),0);
  const mgrLeft = mgrEarnedAll - mgrTakenAll;
  const accLeft = accEarnedAll - accTakenAll;

  const addRow=()=>{
    if(!form.amount||parseFloat(form.amount)<=0){toast("أدخل مبلغ صحيح","warn");return;}
    setDaily(p=>[...p,{id:Date.now(),date:selDay,type:form.type,amount:parseFloat(form.amount),desc:form.desc||""}]);
    setForm({type:form.type,amount:"",desc:""});
    toast("✅ تمت الإضافة");
  };
  const delRow=(id)=>setDaily(p=>p.filter(d=>d.id!==id));

  const isFirstDay = !firstOpenKey || selDay <= firstOpenKey;
  const dLabel = ymd => { if(!ymd) return ""; const [y,m,d]=ymd.split("-"); return d+"/"+parseInt(m)+"/"+y; };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:19,fontWeight:800}}>📒 دفتر اليومية</div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <label style={{fontWeight:700,fontSize:15}}>اليوم:</label>
          <input type="date" style={{...styles.input,width:"auto"}} value={selDay} onChange={e=>setSelDay(e.target.value)}/>
          <button style={{...styles.btn(C.gold),fontSize:15,padding:"8px 16px"}} onClick={()=>printDailyReport(selDay,dayRows,openingBalance,closingBalance,sumByType)}>🖨️ طباعة اليوم</button>
        </div>
      </div>

      {/* ملخص اليوم */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:16}}>
        <div style={{...styles.card,borderTop:"4px solid #64748b"}}>
          <div style={{fontSize:14,color:"#9ca3af",marginBottom:6}}>الرصيد الافتتاحي</div>
          <div style={{fontSize:20,fontWeight:900,color:"#334155"}}>{SAR(openingBalance)}</div>
          <div style={{fontSize:13,color:"#9ca3af",marginTop:4}}>متبقي أمس</div>
        </div>
        <div style={{...styles.card,borderTop:"4px solid #16a34a"}}>
          <div style={{fontSize:14,color:"#9ca3af",marginBottom:6}}>سدادات اليوم</div>
          <div style={{fontSize:20,fontWeight:900,color:"#16a34a"}}>{SAR(sumByType("sadad"))}</div>
        </div>
        <div style={{...styles.card,borderTop:"4px solid #dc2626"}}>
          <div style={{fontSize:14,color:"#9ca3af",marginBottom:6}}>المصروفات + السحوبات</div>
          <div style={{fontSize:20,fontWeight:900,color:"#dc2626"}}>{SAR(sumByType("masroof")+sumByType("sahb")+sumByType("estilam"))}</div>
        </div>
        <div style={{...styles.card,borderTop:"4px solid #0d9488",background:"#f0fdfa"}}>
          <div style={{fontSize:14,color:"#0d9488",marginBottom:6,fontWeight:700}}>💰 المتبقي في الصندوق</div>
          <div style={{fontSize:22,fontWeight:900,color:closingBalance>=0?"#0d9488":"#dc2626"}}>{SAR(closingBalance)}</div>
        </div>
      </div>

      {/* حساب المدير والمحاسب */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:16}}>
        <div style={{...styles.card,borderTop:"4px solid #b45309"}}>
          <div style={{fontSize:15,fontWeight:800,color:"#b45309",marginBottom:8}}>👔 حساب المدير</div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:4}}><span style={{color:"#9ca3af"}}>المستحق (كل العقود)</span><span style={{fontWeight:700}}>{SAR(mgrEarnedAll)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:4}}><span style={{color:"#9ca3af"}}>المستلم</span><span style={{fontWeight:700,color:C.red}}>{SAR(mgrTakenAll)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:15,marginTop:6,paddingTop:6,borderTop:"1px solid "+C.border}}><span style={{fontWeight:800}}>الباقي له</span><span style={{fontWeight:900,color:mgrLeft>=0?"#b45309":C.red}}>{SAR(mgrLeft)}</span></div>
        </div>
        <div style={{...styles.card,borderTop:"4px solid #0891b2"}}>
          <div style={{fontSize:15,fontWeight:800,color:"#0891b2",marginBottom:8}}>🧮 حساب المحاسب</div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:4}}><span style={{color:"#9ca3af"}}>المستحق (كل العقود)</span><span style={{fontWeight:700}}>{SAR(accEarnedAll)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:4}}><span style={{color:"#9ca3af"}}>المستلم</span><span style={{fontWeight:700,color:C.red}}>{SAR(accTakenAll)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:15,marginTop:6,paddingTop:6,borderTop:"1px solid "+C.border}}><span style={{fontWeight:800}}>الباقي له</span><span style={{fontWeight:900,color:accLeft>=0?"#0891b2":C.red}}>{SAR(accLeft)}</span></div>
        </div>
      </div>

      {/* رصيد افتتاحي يدوي (يظهر فقط لأول يوم أو إذا لم يُحدد) */}
      <div style={{...styles.card,marginBottom:16,background:"#fffbf0",border:"1px solid "+C.gold}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:14,fontWeight:700,color:"#8a6200"}}>تعيين رصيد افتتاحي يدوي لهذا اليوم (للبداية فقط):</span>
          <input type="number" placeholder="مثال: 15000" style={{...styles.input,width:140}}
            value={manualOpen!==undefined?manualOpen:""}
            onChange={e=>setDailyOpen(p=>({...p,[selDay]:parseFloat(e.target.value)||0}))}/>
          {manualOpen!==undefined && <button style={{...styles.btn(C.red),fontSize:13,padding:"4px 10px"}}
            onClick={()=>setDailyOpen(p=>{const n={...p};delete n[selDay];return n;})}>إلغاء</button>}
        </div>
        <div style={{fontSize:13,color:"#9ca3af",marginTop:6}}>اتركه فارغاً ليُحسب تلقائياً من متبقي اليوم السابق</div>
      </div>

      {/* إضافة حركة */}
      <div style={{...styles.panel,marginBottom:16}}>
        <div style={styles.panelHdr}><h3 style={{margin:0,fontSize:15,fontWeight:700}}>➕ إضافة حركة</h3></div>
        <div style={{padding:"14px 18px"}}>

// ─── Investors Page ──────────────────────────────────────────

// ─── Goods Page ─────────────────────────────────────────────
function GoodsPage({investors, contracts, toast}) {
  const [priceOverrides, setPriceOverrides] = useState(()=>{
    try{return JSON.parse(localStorage.getItem("qimma_price_ov")||"{}");}catch{return{};}
  });
  const [manualRows, setManualRows] = useState(()=>{
    try{return JSON.parse(localStorage.getItem("qimma_goods3")||"[]");}catch{return[];}
  });
  const [showAdd, setShowAdd] = useState(false);
  const [newRow, setNewRow] = useState({date:new Date().toISOString().split("T")[0],supportAcc:"",note:"",price:""});

  const saveManual = r => { setManualRows(r); localStorage.setItem("qimma_goods3",JSON.stringify(r)); };
  const savePriceOverride = (id, val) => {
    const p = {...priceOverrides, [id]: val};
    setPriceOverrides(p);
    localStorage.setItem("qimma_price_ov", JSON.stringify(p));
  };

  // Build rows from contracts + manual
  const contractRows = contracts.map(c=>{
    const inv = investors.find(i=>String(i.id)===String(c.investorId));
    return {
      id:"c_"+c.id, date:c.date, contractNum:c.num,
      contractAmount:parseFloat(c.amount)||0,
      client:c.client,
      investor:inv?inv.name:"—",
      supportClient:(c.deductEnabled&&c.deductAmount)?parseFloat(c.deductAmount)||0:0,
      supportAcc:0,
      withdrawnQty:parseInt(c.qty)||0,
      fromContract:true,
    };
  });

  // ترتيب زمني: بالتاريخ، ثم بوقت الإنشاء (timestamp) — آخر عملية تكون آخر صف
  const seqOf = r => {
    // العقد id = "c_<timestamp>"، اليدوي id = <timestamp> رقمي
    const raw = String(r.id).replace(/^c_/,"");
    const n = parseInt(raw,10);
    return isNaN(n) ? 0 : n;
  };
  const allRows = [...contractRows, ...manualRows].sort((a,b)=>{
    const d = new Date(a.date)-new Date(b.date);
    if(d!==0) return d;
    return seqOf(a)-seqOf(b);  // نفس اليوم: الأقدم إنشاءً أولاً، الأحدث آخراً
  });

  // Calculate running balance with per-row price
  let runningCards = 0;
  let lastPrice = 0;
  const display = allRows.map(row=>{
    const rowPrice = parseFloat(priceOverrides[row.id]||row.price)||lastPrice||1;
    if(rowPrice) lastPrice = rowPrice;
    const supC = parseFloat(row.supportClient)||0;
    const supA = parseFloat(row.supportAcc)||0;
    const supported = supC||supA ? Math.floor((supC+supA)/rowPrice) : 0;
    const withdrawn = parseInt(row.withdrawnQty)||0;
    runningCards = runningCards + supported - withdrawn;
    return {...row, rowPrice, supported, withdrawn, runningCards, cashBalance:runningCards*rowPrice};
  });

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:19,fontWeight:800}}>📦 البضاعة</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>

          <button style={styles.btn(C.teal)} onClick={()=>setShowAdd(s=>!s)}>➕ إضافة دعم</button>
        </div>
      </div>

      {/* Add manual row */}
      {showAdd && (
        <div style={{...styles.panel,marginBottom:16,padding:16}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>إضافة دعم حساب</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:4}}>التاريخ</label>
              <input style={styles.input} type="date" value={newRow.date} onChange={e=>setNewRow(p=>({...p,date:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:4}}>دعم الحساب (ر.س)</label>
              <input style={styles.input} type="number" placeholder="المبلغ" value={newRow.supportAcc} onChange={e=>setNewRow(p=>({...p,supportAcc:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:4}}>سعر البطاقة</label>
              <input style={styles.input} type="number" placeholder="اتركه فارغ للتعبئة التلقائية" value={newRow.price} onChange={e=>setNewRow(p=>({...p,price:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:15,fontWeight:700,color:C.ink2,display:"block",marginBottom:4}}>ملاحظة</label>
              <input style={styles.input} type="text" placeholder="اختياري" value={newRow.note} onChange={e=>setNewRow(p=>({...p,note:e.target.value}))}/>
            </div>
          </div>
          <button style={styles.btn(C.teal)} onClick={()=>{
            if(!newRow.supportAcc){toast("أدخل مبلغ الدعم","error");return;}
            saveManual([...manualRows,{id:Date.now(),date:newRow.date,contractNum:"—",contractAmount:0,client:newRow.note||"دعم حساب",investor:"—",supportClient:0,supportAcc:parseFloat(newRow.supportAcc)||0,withdrawnQty:0,fromContract:false,price:parseFloat(newRow.price)||0}]);
            setNewRow({date:new Date().toISOString().split("T")[0],supportAcc:"",note:"",price:""});
            setShowAdd(false);
            toast("✅ تم إضافة الدعم");
          }}>💾 حفظ</button>
        </div>
      )}

      {/* Table */}
      <div style={{overflowX:"auto",borderRadius:10,boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:14,minWidth:1000}}>
          <thead>
            <tr style={{background:C.ink,color:"#fff"}}>
              {["التاريخ","رقم العقد","قيمة العقد","اسم العميل","اسم المستثمر","دعم العميل","دعم الحساب","سعر البطاقة","البطاقات المدعومة","البطاقات المسحوبة","رصيد البطاقات","الرصيد النقدي",""].map(h=>(
                <th key={h} style={{padding:"8px 8px",whiteSpace:"nowrap",fontWeight:700,textAlign:"center",
                  background:["رصيد البطاقات","الرصيد النقدي"].includes(h)?"#1a6b4a":C.ink}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {display.length===0?(
              <tr><td colSpan={12} style={{textAlign:"center",padding:40,color:"#9ca3af"}}>لا توجد بيانات</td></tr>
            ):display.map((row,i)=>(
              <tr key={row.id||i} style={{background:i%2===0?"#fff":"#f8f8f8"}}>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center"}}>{row.date}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center",fontWeight:700}}>{row.contractNum}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center"}}>{row.contractAmount>0?row.contractAmount.toLocaleString("ar-SA"):""}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",fontWeight:700}}>{row.client}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee"}}>{row.investor}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center",color:C.green,fontWeight:700}}>{row.supportClient>0?row.supportClient.toLocaleString("ar-SA"):""}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center",color:C.teal,fontWeight:700}}>{row.supportAcc>0?row.supportAcc.toLocaleString("ar-SA"):""}</td>
                <td style={{padding:"3px 4px",borderBottom:"1px solid #eee",textAlign:"center"}}>
                  <input type="number" value={priceOverrides[row.id]||row.price||""}
                    placeholder={String(row.rowPrice||"")}
                    onChange={e=>savePriceOverride(row.id,e.target.value)}
                    style={{width:65,border:"1px solid "+C.gold,borderRadius:4,padding:"3px 4px",fontSize:14,textAlign:"center",background:"#fffbf0"}}/>
                </td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center",background:"#f0faf5",fontWeight:700}}>{row.supported>0?row.supported:""}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center",color:C.red,fontWeight:700}}>{row.withdrawn>0?row.withdrawn:""}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center",background:"#f0f0ff",fontWeight:800,color:C.teal}}>{row.runningCards}</td>
                <td style={{padding:"6px 8px",borderBottom:"1px solid #eee",textAlign:"center",background:"#fffbf0",fontWeight:800,color:row.cashBalance<0?C.red:C.gold}}>{row.rowPrice?row.cashBalance.toLocaleString("ar-SA"):""}</td>
                <td style={{padding:"4px",borderBottom:"1px solid #eee",textAlign:"center"}}>
                  {!row.fromContract&&<button style={{...styles.btn(C.red),fontSize:13,padding:"3px 8px"}} onClick={()=>saveManual(manualRows.filter(r=>r.id!==row.id))}>🗑️</button>}
                </td>

            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
