function calcContract(amount, s = {profit:50, admin:2.5, acc:10, inst:10}) {
  const profit = amount * (s.profit/100);
  const admin  = amount * (s.admin/100);
  const acc    = profit * (s.acc/100);
  const inst   = profit * (s.inst/100);
  const net    = profit - admin - acc - inst;
  const total  = amount + profit;
  return { profit, admin, acc, inst, net, total };
}

function numToWords(n) {
  n = Math.round(n);
  const ones=["","واحد","اثنان","ثلاثة","أربعة","خمسة","ستة","سبعة","ثمانية","تسعة","عشرة","أحد عشر","اثنا عشر","ثلاثة عشر","أربعة عشر","خمسة عشر","ستة عشر","سبعة عشر","ثمانية عشر","تسعة عشر"];
  const tens=["","","عشرون","ثلاثون","أربعون","خمسون","ستون","سبعون","ثمانون","تسعون"];
  const hundreds=["","مائة","مئتان","ثلاثمائة","أربعمائة","خمسمائة","ستمائة","سبعمائة","ثمانمائة","تسعمائة"];
  if(n===0)return"صفر";
  let r="";
  if(n>=1000){const t=Math.floor(n/1000);r+=(t===1?"ألف":t===2?"ألفان":t<=10?ones[t]+" آلاف":numToWords(t)+" ألف")+" ";n%=1000;}
  if(n>=100){r+=hundreds[Math.floor(n/100)]+" ";n%=100;}
  if(n>=20){r+=tens[Math.floor(n/10)]+(n%10?" و"+ones[n%10]:"")+" ";n=0;}
  if(n>0)r+=ones[n]+" ";
  return r.trim();
}

function toHijri(dateStr) {
  if(!dateStr)return"..../.../14....";
  try{return new Date(dateStr).toLocaleDateString("ar-SA-u-ca-islamic",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\u200f/g,"");}
  catch{return dateStr;}
}

function addMonths(dateStr, n) {
  if(!dateStr)return"";
  const d=new Date(dateStr);
  d.setMonth(d.getMonth()+n);
  return d.toISOString().split("T")[0];
}

function fmtDate(dateStr) {
  if(!dateStr)return"—";
  try{return new Date(dateStr).toLocaleDateString("ar-SA",{year:"numeric",month:"long",day:"numeric"});}
  catch{return dateStr;}
}

const _getPaid = (payments, cid) => (payments||[]).filter(p=>p.contractId===cid).reduce((s,p)=>s+p.amount,0);

function ContractsPage({contracts,investors,settings,onDelete,payments,setPayments,toast,completionAlert,setCompletionAlert}) {
  const [payModal,setPayModal]=useState(null);

  const [payNote,setPayNote]=useState("");

  const markDone = (id) => { const d=[...doneIds,id]; setDoneIds(d); localStorage.setItem("qimma_done",JSON.stringify(d)); };
  const addPayment=()=>{
    if(!payAmount||!payModal)return;
    const paid = _getPaid(payments, payModal.id) + parseFloat(payAmount);
    setPayments(p=>[...p,{id:Date.now(),contractId:payModal.id,amount:parseFloat(payAmount),date:payDate,note:payNote||"قسط"}]);
    setPayAmount("");setPayNote("");
    if(paid>=(payModal.totalInst||0) && !doneIds.includes(payModal.id)){
      setPayModal(null);
      setCompletionAlert(payModal);
    } else {
      toast("✅ تم تسجيل السداد");
    }
  };
  const [search,setSearch] = useState("");
  const [bond,setBond] = useState(null);
  const [cheque,setCheque] = useState(null);

function ZakatPage({investors, contracts, settings, zakatTx, setZakatTx}) {
  const today = new Date().toISOString().split("T")[0];
  const [form,setForm]=useState({type:"collect",amount:"",name:"",date:today,note:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const totalIn  = zakatTx.filter(t=>t.type==="collect").reduce((s,t)=>s+t.amount,0);
  const totalOut = zakatTx.filter(t=>t.type==="pay").reduce((s,t)=>s+t.amount,0);
  const balance  = totalIn - totalOut;

  const save=()=>{
    if(!form.amount){return;}
    setZakatTx(p=>[...p,{id:Date.now(),...form,amount:parseFloat(form.amount)}]);

        <div style={styles.panelHdr}><h3 style={{margin:0,fontSize:13,fontWeight:700}}>➕ تسجيل حركة زكاة</h3></div>
        <div style={{padding:"14px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:12}}>

              <label style={{fontSize:12,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>النوع</label>

                <option value="pay">صرف زكاة لمستحق</option>

              <label style={{fontSize:12,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>
                {form.type==="collect"?"اسم المستثمر":"اسم المستحق"}

              <input style={styles.input} type="text" placeholder="الاسم"
                value={form.name} onChange={e=>set("name",e.target.value)}/>

            <div>
              <label style={{fontSize:12,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>المبلغ (ر.س)</label>
              <input style={{...styles.input,borderColor:form.type==="collect"?C.green:C.red,fontWeight:700}}
                type="number" placeholder="مثال: 1000"
                value={form.amount} onChange={e=>set("amount",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>التاريخ</label>
              <input style={styles.input} type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
            </div>
          </div>
          <button style={styles.btn(form.type==="collect"?C.green:C.red)} onClick={save}>
            {form.type==="collect"?"💰 إضافة للصندوق":"📤 صرف من الصندوق"}
          </button>
        </div>
      </div>

      {/* Zakat table */}
      <div style={styles.panel}>
        <div style={styles.panelHdr}><h3 style={{margin:0,fontSize:13,fontWeight:700}}>📋 سجل الزكاة</h3></div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr>{["التاريخ","النوع","الاسم","المبلغ","الرصيد بعد",""].map(h=>(
                <th key={h} style={styles.th}>{h}</th>

            </thead>
            <tbody>
              {zakatTx.length===0 ? (
                <tr><td colSpan={6} style={{...styles.td,textAlign:"center",padding:40,color:"#9ca3af"}}>لا توجد حركات</td></tr>
              ) : (()=>{
                let running=0;
                return zakatTx.map((t,i)=>{
                  running += t.type==="collect" ? t.amount : -t.amount;
                  return (
                    <tr key={t.id} style={{background:i%2===0?C.white:C.gray}}>
                      <td style={{...styles.td,fontSize:11,color:"#666"}}>{t.date}</td>

                      <td style={{...styles.td,fontWeight:700}}>{t.name||"—"}</td>
                      <td style={{...styles.td,color:t.type==="collect"?C.green:C.red,fontWeight:700}}>{SAR(t.amount)}</td>
                      <td style={{...styles.td,fontWeight:800,color:running>=0?C.teal:C.red}}>{SAR(running)}</td>
                      <td style={styles.td}>
                        <button style={{...styles.btn(C.red),fontSize:11,padding:"4px 10px"}}
                          onClick={()=>setZakatTx(p=>p.filter(x=>x.id!==t.id))}>🗑️</button>
                      </td>
                    </tr>
                  );
                });
              })()}
            </tbody>
            {zakatTx.length>0 && (
              <tfoot>
                <tr style={{background:C.goldLt}}>
                  <td colSpan={3} style={{...styles.td,fontWeight:800}}>الرصيد الحالي</td>

                </tr>
              </tfoot>
            )}
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── Commissions Page ────────────────────────────────────────
function CommissionsPage({contracts, investors, settings}) {
  const months = [...new Set(contracts.map(c=>{
    const d=new Date(c.date);
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  }))].sort().reverse();
  if(!months.length){const n=new Date();months.push(n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0"));}
  const [selMonth,setSelMonth]=useState(months[0]);
  const [tab,setTab]=useState("acc"); // acc = محاسبين, inst = مؤسسة

  const mLabel=ym=>{const[y,m]=ym.split("-");const ns=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];return(ns[parseInt(m)-1]||"")+" "+y;};

  const mc = contracts.filter(c=>{
    const d=new Date(c.date);
    return(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"))===selMonth;
  });

  const rows = mc.map(c=>{
    const r = calcContract(c.amount, settings);
    const inv = investors.find(i=>i.id===c.investorId);
    return {
      num: c.num||"—",
      client: c.client,
      investor: inv?inv.name:"—",
      goods: c.goods||"—",
      amount: c.amount,
      profit: r.profit,
      acc: r.acc,
      inst: r.inst,
      admin: r.admin,
      instTotal: r.inst + r.admin,
    };
  });

  const totalAcc   = rows.reduce((s,r)=>s+r.acc,0);
  const totalInst  = rows.reduce((s,r)=>s+r.inst,0);
  const totalAdmin = rows.reduce((s,r)=>s+r.admin,0);
  const totalInstTotal = rows.reduce((s,r)=>s+r.instTotal,0);

  const thS = {...styles.th, padding:"10px 12px"};
  const tdS = {...styles.td, padding:"9px 12px"};

  return (

        <label style={{fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>الشهر:</label>
        <select style={{...styles.select,width:"auto",minWidth:160,borderColor:C.teal,color:C.teal,fontWeight:700,background:C.tealLt}}
          value={selMonth} onChange={e=>setSelMonth(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{mLabel(m)}</option>)}
        </select>
        <button style={{...styles.btn(C.gold),marginRight:"auto"}} onClick={()=>window.print()}>🖨️ طباعة</button>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:0,marginBottom:16,background:C.white,borderRadius:10,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",width:"fit-content"}}>
        {[
          {key:"acc",  label:"📋 نسب المحاسبين",  color:C.teal},
          {key:"inst", label:"🏛️ نسب المؤسسة",    color:C.purple},
        ].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)}
            style={{fontFamily:"Tajawal,Arial",fontSize:13,fontWeight:700,padding:"10px 22px",border:"none",
              cursor:"pointer",background:tab===t.key?t.color:C.white,color:tab===t.key?"white":C.ink2,
              transition:"all 0.2s"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Summary cards */}
      {tab==="acc" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
          <KpiCard label="عدد العقود" value={NUM(rows.length)} color={C.teal}/>
          <KpiCard label="إجمالي قيم العقود" value={SAR(rows.reduce((s,r)=>s+r.amount,0))} color={C.ink}/>
          <KpiCard label="إجمالي الأرباح" value={SAR(rows.reduce((s,r)=>s+r.profit,0))} color={C.green}/>

        </div>
      )}
      {tab==="inst" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
          <KpiCard label="عدد العقود" value={NUM(rows.length)} color={C.purple}/>
          <KpiCard label="نصيب المؤسسة (10%)" value={SAR(totalInst)} color={C.purple}/>
          <KpiCard label="الرسوم الإدارية (2.5%)" value={SAR(totalAdmin)} color={C.gold}/>
          <KpiCard label="✅ إجمالي المؤسسة" value={SAR(totalInstTotal)} color={C.ink}/>
        </div>
      )}

      {/* Table */}
      <div style={styles.panel}>

          <div style={{color:"white",fontWeight:800,fontSize:14}}>
            {tab==="acc" ? "📋 تفصيل نسب المحاسبين" : "🏛️ تفصيل نسب المؤسسة"} — {mLabel(selMonth)}
          </div>
          <div style={{color:"rgba(255,255,255,0.8)",fontSize:13,fontWeight:700}}>
            الإجمالي: {SAR(tab==="acc"?totalAcc:totalInstTotal)}

        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>

                  <th style={{...thS,background:C.purple,color:"#e8c8ff"}}>نصيب المؤسسة (10%)</th>
                  <th style={{...thS,background:C.purple,color:"#e8c8ff"}}>الرسوم الإدارية (2.5%)</th>
                  <th style={{...thS,background:C.purple,color:"#f5d28a"}}>الإجمالي</th>

            </thead>
            <tbody>
              {rows.length===0 ? (

                  لا توجد عقود هذا الشهر
                </td></tr>
              ) : rows.map((row,i)=>(
                <tr key={i} style={{background:i%2===0?C.white:C.gray}}>
                  <td style={{...tdS,color:"#9ca3af"}}>{row.num}</td>
                  <td style={{...tdS,fontWeight:700}}>{row.client}</td>
                  <td style={tdS}>{row.investor}</td>
                  <td style={tdS}>{SAR(row.amount)}</td>
                  <td style={{...tdS,color:C.green}}>{SAR(row.profit)}</td>
                  {tab==="acc" ? (
                    <td style={{...tdS,color:C.teal,fontWeight:800,fontSize:13,textAlign:"center"}}>{SAR(row.acc)}</td>
                  ) : (<>
                    <td style={{...tdS,color:C.purple,fontWeight:700,textAlign:"center"}}>{SAR(row.inst)}</td>
                    <td style={{...tdS,color:C.gold,fontWeight:700,textAlign:"center"}}>{SAR(row.admin)}</td>
                    <td style={{...tdS,color:C.ink,fontWeight:800,fontSize:13,textAlign:"center"}}>{SAR(row.instTotal)}</td>
                  </>)}

              ))}
            </tbody>
            {rows.length>0 && (
              <tfoot>

// ─── Accounts Page ───────────────────────────────────────────
const TX_TYPES = [
  {key:"deposit",   label:"إيداع / دعم",      color:"#1a7a4a", sign:1},
  {key:"withdraw",  label:"سحب",              color:"#c0392b", sign:-1},
  {key:"installments",label:"أقساط واردة",    color:"#0d7377", sign:1},
  {key:"expenses",  label:"مصروفات",          color:"#c0392b", sign:-1},
  {key:"contract",  label:"خصم عقد",          color:"#7030A0", sign:-1},
];

function AccountsPage({contracts, investors, settings, txList, setTxList, loans, setLoans, zakatTx, setZakatTx, pending, setPending, payments}) {
  const [subTab, setSubTab] = useState("inv");
  const [selInv, setSelInv] = useState(investors[0]?.id||null);
  const [form, setForm] = useState({type:"deposit", amount:"", note:"", date:new Date().toISOString().split("T")[0]});
  const set = (k,v) => {
    setForm(f=>({...f,[k]:v}));
    // Auto-fill if idNum entered and matches existing contract
    if(k==="idNum" && v.length>=9){
      const prev = contracts.find(c=>c.idNum===v);
      if(prev){
        setForm(f=>({...f, idNum:v, client:prev.client||f.client, job:prev.job||f.job, cPhone:prev.cPhone||f.cPhone}));
        toast("✅ تم تعبئة بيانات العميل تلقائياً");
      }
    }
  };

  const inv = investors.find(i=>i.id===selInv);
  const myTx = (txList[selInv]||[]);

  // Auto-transactions from contracts
  const myContracts = contracts.filter(c=>c.investorId===selInv);
  const autoTx = myContracts.map(c=>{
    const r = calcContract(c.amount, settings);
    // ينخصم: قيمة العقد النقدية + عمولة المحاسبين + نصيب المؤسسة + الرسوم الإدارية
    const deduct = c.amount + r.acc + r.inst + r.admin;
    return {
      id:"auto_"+c.id, date:c.date, auto:true,
      type:"contract",
      amount:-deduct,
      note:"خصم عقد رقم "+(c.num||"—")+" | "+c.client+" | "+(c.goods||"")+(c.qty?" ("+c.qty+" قطعة)":""),
      breakdown:"نقدي: "+SAR(c.amount)+" | محاسبين: "+SAR(r.acc)+" | مؤسسة: "+SAR(r.inst)+" | رسوم: "+SAR(r.admin),
      admin:r.admin, acc:r.acc, inst:r.inst, net:r.net
    };
  });

  // Auto payments grouped by month
  const paysByMonth = {};
  (payments||[]).forEach(p=>{
    const c = myContracts.find(x=>x.id===p.contractId);
    if(!c) return;
    const d = new Date(p.date);
    const ym = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    if(!paysByMonth[ym]) paysByMonth[ym]={amount:0, count:0, date:ym+"-01"};
    paysByMonth[ym].amount += p.amount;
    paysByMonth[ym].count  += 1;
  });
  const mNames=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const autoPayments = Object.entries(paysByMonth).map(([ym,v])=>{
    const [y,m]=ym.split("-");
    return {
      id:"pay_"+ym, date:v.date, auto:true,
      type:"installments",
      amount:v.amount,
      note:"أقساط "+mNames[parseInt(m)-1]+" "+y+" ("+v.count+" قسط)"
    };
  });

  // Merge and sort all transactions
  const allTx = [...autoTx, ...autoPayments, ...myTx].sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Running balance
  let balance = inv?.capital || 0;
  const rows = allTx.map(tx=>{
    balance += tx.amount;
    return {...tx, balance};
  });

  const addTx = () => {
    if(!form.amount||!form.date){return;}
    const txType = TX_TYPES.find(t=>t.key===form.type);
    const amt = parseFloat(form.amount) * txType.sign;
    const newTx = {id:Date.now(), date:form.date, type:form.type,
      amount:amt, note:form.note||txType.label};
    setTxList(p=>({...p,[selInv]:[...(p[selInv]||[]), newTx]}));
    setForm(f=>({...f, amount:"", note:""}));
  };

  const delTx = (id) => setTxList(p=>({...p,[selInv]:(p[selInv]||[]).filter(t=>t.id!==id)}));

  const finalBalance = rows.length>0 ? rows[rows.length-1].balance : (inv?.capital||0);
  const totalDeposits = allTx.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const totalWithdraws = allTx.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);

  const subTabs = [
    {key:"inv",   label:"💰 حسابات المستثمرين"},
    {key:"loans", label:"🤝 السلف"},
    {key:"zakat", label:"🌙 الزكاة"},
    {key:"pending",label:"📌 المتبقي"},
  ];

  return (
    <div>
      <div style={{fontSize:17,fontWeight:800,marginBottom:16}}>💰 الحسابات</div>

      {/* Sub tabs */}
      <div style={{display:"flex",gap:0,marginBottom:20,background:C.white,borderRadius:10,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",width:"fit-content"}}>
        {subTabs.map(t=>(
          <button key={t.key} onClick={()=>setSubTab(t.key)}
            style={{fontFamily:"Tajawal,Arial",fontSize:12,fontWeight:700,padding:"10px 16px",border:"none",
              cursor:"pointer",background:subTab===t.key?C.teal:C.white,color:subTab===t.key?"white":C.ink2,
              transition:"all 0.2s",whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Loans sub-page */}
      {subTab==="loans" && <LoansPage loans={loans} setLoans={setLoans}/>}
      {/* Zakat sub-page */}
      {subTab==="zakat" && <ZakatPage investors={investors} contracts={contracts} settings={settings} zakatTx={zakatTx} setZakatTx={setZakatTx}/>}
      {/* Pending sub-page */}
      {subTab==="pending" && <PendingPage pending={pending} setPending={setPending}/>}

      {/* Investor accounts sub-page */}
      {subTab==="inv" && <>

      {/* Investor selector */}
      <div style={{...styles.card,marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <label style={{fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>المستثمر:</label>
        <select style={{...styles.select,flex:1,maxWidth:300,borderColor:C.teal,color:C.teal,fontWeight:700}}
          value={selInv||""} onChange={e=>setSelInv(parseInt(e.target.value))}>
          {investors.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
        </select>
        {inv && (
          <div style={{display:"flex",gap:12,marginRight:"auto",flexWrap:"wrap"}}>
            <div style={{textAlign:"center",background:C.tealLt,borderRadius:8,padding:"6px 14px"}}>
              <div style={{fontSize:10,color:"#555",marginBottom:2}}>رأس المال</div>
              <div style={{fontSize:14,fontWeight:800,color:C.teal}}>{SAR(inv.capital||0)}</div>
            </div>
            <div style={{textAlign:"center",background:C.greenLt,borderRadius:8,padding:"6px 14px"}}>
              <div style={{fontSize:10,color:"#555",marginBottom:2}}>الرصيد الحالي</div>
              <div style={{fontSize:14,fontWeight:800,color:C.green}}>{SAR(finalBalance)}</div>
            </div>
            <div style={{textAlign:"center",background:finalBalance>=0?C.greenLt:C.redLt,borderRadius:8,padding:"6px 14px"}}>
              <div style={{fontSize:10,color:"#555",marginBottom:2}}>الفرق</div>
              <div style={{fontSize:14,fontWeight:800,color:finalBalance>=(inv?.capital||0)?C.green:C.red}}>
                {SAR(finalBalance-(inv?.capital||0))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Add transaction */}
      <div style={{...styles.panel,marginBottom:16}}>
        <div style={styles.panelHdr}><h3 style={{margin:0,fontSize:13,fontWeight:700}}>➕ إضافة حركة</h3></div>
        <div style={{padding:"14px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:12,fontWeight:700,color:C.ink2,display:"block",marginBottom:5}}>نوع الحركة</label>
              <select style={styles.select} value={form.type} onChange={e=>set("type",e.target.value)}>
                {TX_TYPES.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}
              </select>
            </div>
            <div>

// ─── Monthly Jard ────────────────────────────────────────────
function JardPage({contracts,investors,settings,txList,loans,zakatTx,pending}) {
  const today = new Date();
  const currentYM = today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0");
  const months = [...new Set(contracts.map(c=>{const d=new Date(c.date);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}))].sort().reverse();
  if(!months.includes(currentYM)) months.unshift(currentYM);
  const [selMonth,setSelMonth]=useState(months[0]);
  const [overrides,setOverrides]=useState({});

  const mLabel=ym=>{const[y,m]=ym.split("-");const ns=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];return(ns[parseInt(m)-1]||"")+" "+y;};
  const mc = contracts.filter(c=>{const d=new Date(c.date);return(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"))===selMonth;});

  const getVal = (key) => {
    if(overrides[selMonth+"_"+key]!==undefined) return overrides[selMonth+"_"+key];
    // سحب تلقائي من الصفحات المرتبطة
    if(key==="loans")   return (loans||[]).filter(l=>l.status==="pending").reduce((s,l)=>s+l.amount,0);
    if(key==="zakat")   return (zakatTx||[]).reduce((s,t)=>s+(t.type==="collect"?t.amount:-t.amount),0);
    if(key==="deductions") return (pending||[]).reduce((s,p)=>s+p.amount,0);
    return 0;
  };
  const setVal = (key,v) => setOverrides(p=>({...p,[selMonth+"_"+key]:parseFloat(v)||0}));
  const getInv = (id) => {
    const key = selMonth+"_inv_"+id;
    if(overrides[key]!==undefined) return overrides[key];
    // سحب الرصيد الحالي من الحسابات
    const inv = investors.find(i=>i.id===id);
    const capital = inv?.capital||0;
    const myContracts = contracts.filter(c=>c.investorId===id);
    const myManualTx = (txList[id]||[]);
    // auto tx from contracts
    const autoDeduct = myContracts.reduce((s,c)=>{
      const r=calcContract(c.amount,settings);
      return s-(c.amount+r.acc+r.inst+r.admin);
    },0);
    const manualTotal = myManualTx.reduce((s,t)=>s+t.amount,0);
    return capital + autoDeduct + manualTotal;
  };
  const setInv = (id,sign,v) => {
    const key = selMonth+"_inv_"+id;
    setOverrides(p=>({...p,[key]: sign===1 ? (parseFloat(v)||0) : -(parseFloat(v)||0)}));
  };

  const otherRows = [
    {key:"cash",       name:"الرصيد النقدي",           sign:1,  hint:"الكاش الفعلي بالمؤسسة"},
    {key:"cards",      name:"رصيد البطاقات",            sign:1,  hint:"قيمة البضاعة الموجودة"},
    {key:"accounts",   name:"رصيد الحسابات البنكية",   sign:1,  hint:"إجمالي الحسابات البنكية"},
    {key:"loans",      name:"السلف",                   sign:-1, hint:"مبالغ أسلفتها لأشخاص"},
    {key:"zakat",      name:"صندوق الزكاة",            sign:1,  hint:"الزكاة المجمّعة"},
    {key:"deductions", name:"المتبقي من الاستقطاعات",  sign:-1, hint:"أرصدة معلقة مجهولة"},
  ];

  // calc totals with correct signs
  let totalMojab = 0, totalSalib = 0;
  investors.forEach(inv=>{
    const v = getInv(inv.id);
    if(v>0) totalMojab+=v; else totalSalib+=Math.abs(v);
  });
  otherRows.forEach(r=>{
    const v = getVal(r.key)||0;
    if(r.sign===1) totalMojab+=v; else totalSalib+=v;
  });
  const farq = totalMojab - totalSalib;

  const thS = {...styles.th, padding:"10px 14px"};
  const tdS = {...styles.td, padding:"9px 12px", verticalAlign:"middle"};
  const inpS = (color)=>({...styles.input,width:"100%",maxWidth:130,textAlign:"center",borderColor:color,color,fontWeight:700,padding:"6px 8px",fontSize:13});

  const Row = ({name,mojab,salib,onMojab,onSalib,auto,isInv,hint,i}) => (
    <tr style={{background:i%2===0?C.white:C.gray}}>
      <td style={tdS}>
        <span style={{fontWeight:700}}>{name}</span>
        {hint && <div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>{hint}</div>}
        {isInv && <div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>رصيد الحساب الجاري</div>}
      </td>
      <td style={{...tdS,textAlign:"center"}}>
        <input type="number" value={mojab||""} onChange={e=>onMojab(e.target.value)}
          placeholder="0" style={inpS(C.green)}/>
      </td>
      <td style={{...tdS,textAlign:"center"}}>
        <input type="number" value={salib||""} onChange={e=>onSalib(e.target.value)}
          placeholder="0" style={inpS(C.red)}/>
      </td>
    </tr>
  );

  return (
    <div>
      {/* Month + header */}
      <div style={{...styles.card,display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <label style={{fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>شهر الجرد:</label>
        <select style={{...styles.select,width:"auto",minWidth:160,borderColor:C.teal,color:C.teal,fontWeight:700,background:C.tealLt}}
          value={selMonth} onChange={e=>setSelMonth(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{mLabel(m)}</option>)}
        </select>
        <button style={{...styles.btn(C.gold),marginRight:"auto"}} onClick={()=>window.print()}>🖨️ طباعة</button>
      </div>

      <div style={styles.panel}>
        {/* Panel header with totals */}
        <div style={{background:"#1e2235",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div style={{color:"white",fontWeight:900,fontSize:15}}>📊 الجرد — {mLabel(selMonth)}</div>
          <div style={{display:"flex",gap:16,alignItems:"center"}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2}}>الموجب</div>
              <div style={{fontSize:16,fontWeight:900,color:"#5cd98a"}}>{totalMojab.toLocaleString("ar-SA")}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2}}>السالب</div>
              <div style={{fontSize:16,fontWeight:900,color:"#ff8080"}}>{totalSalib.toLocaleString("ar-SA")}</div>
            </div>
            <div style={{background:farq>=0?"rgba(92,217,138,0.2)":"rgba(255,128,128,0.2)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2}}>الفرق</div>
              <div style={{fontSize:20,fontWeight:900,color:farq>=0?"#5cd98a":"#ff8080"}}>
                {farq>=0?"":"-"}{Math.abs(farq).toLocaleString("ar-SA")}
              </div>
              <div style={{fontSize:10,color:farq>=0?"#5cd98a":"#ff8080"}}>{farq>=0?"✅ موجب":"⚠️ سالب"}</div>
            </div>
          </div>
        </div>

        {/* Single unified table */}
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr>
                <th style={{...thS,width:"45%",textAlign:"right"}}>البند</th>
                <th style={{...thS,color:"#a8f0c6",textAlign:"center"}}>الموجب ✏️</th>
                <th style={{...thS,color:"#ff9999",textAlign:"center"}}>السالب ✏️</th>
              </tr>
            </thead>
            <tbody>
              {/* Section: أرصدة المستثمرين */}
              <tr>
                <td colSpan={3} style={{background:C.tealLt,color:C.teal,fontWeight:800,fontSize:12,padding:"8px 14px",borderRight:"4px solid "+C.teal}}>
                  أرصدة المستثمرين
                </td>
              </tr>
              {investors.map((inv,i)=>{
                const auto = mc.filter(c=>c.investorId===inv.id).reduce((s,c)=>s+calcContract(c.amount,settings).net,0);
                const cur = getInv(inv.id);
                const mojab = cur>0?cur:0;
                const salib = cur<0?Math.abs(cur):0;
                return <Row key={inv.id} i={i} name={inv.name} mojab={mojab||""} salib={salib||""} auto={auto} isInv
                  onMojab={v=>setInv(inv.id,1,v)}
                  onSalib={v=>setInv(inv.id,-1,v)}/>;
              })}

              {/* Section: الأصول والالتزامات */}
              <tr>
                <td colSpan={3} style={{background:"#fff8e1",color:"#8a6200",fontWeight:800,fontSize:12,padding:"8px 14px",borderRight:"4px solid "+C.gold}}>
                  الأصول والالتزامات
                </td>
              </tr>
              {otherRows.map((row,i)=>{
                const v = getVal(row.key);
                return <Row key={row.key} i={i} name={row.name} hint={row.hint}
                  mojab={row.sign===1?v:""}
                  salib={row.sign===-1?v:""}
                  onMojab={v2=>setVal(row.key,v2)}
                  onSalib={v2=>setVal(row.key,v2)}/>;
              })}

              {/* Total row */}
              <tr style={{background:"#1e2235"}}>
                <td style={{...tdS,color:"white",fontWeight:800}}>المجموع</td>
                <td style={{...tdS,textAlign:"center",color:"#5cd98a",fontWeight:900,fontSize:15}}>{totalMojab.toLocaleString("ar-SA")}</td>
                <td style={{...tdS,textAlign:"center",color:"#ff8080",fontWeight:900,fontSize:15}}>{totalSalib.toLocaleString("ar-SA")}</td>
              </tr>
              <tr style={{background:farq>=0?"#e3f5ec":C.redLt}}>
                <td style={{...tdS,fontWeight:800,color:farq>=0?C.green:C.red}}>الفرق</td>
                <td colSpan={2} style={{...tdS,textAlign:"center",fontWeight:900,fontSize:18,color:farq>=0?C.green:C.red}}>
                  {farq>=0?"":"-"}{Math.abs(farq).toLocaleString("ar-SA")} ريال &nbsp;
                  {farq>=0?"✅":"⚠️"}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

  const mc=contracts.filter(c=>{const d=new Date(c.date);return(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"))===sel;});

        <KpiCard label="نصيب المؤسسة" value={SAR(tot.inst)} color={C.gold}/>
        <KpiCard label="الرسوم الإدارية" value={SAR(tot.admin)} color={C.red}/>
        <KpiCard label="صافي المستثمرين" value={SAR(tot.net)} color={C.ink}/>

        ) : (

              <thead>
                <tr>{["العميل","المستثمر","البضاعة","القيمة","الربح","صافي المستثمر","القسط"].map(h=>(
                  <th key={h} style={styles.th}>{h}</th>

              </thead>

        )}
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────
function App() {
  const [page,setPage]=useState("dashboard");
  const [toastMsg,setToastMsg]=useState(null);
  const [toastType,setToastType]=useState("");

  // ═══ Google Sheets backend ═══
  const GS_URL = "https://script.google.com/macros/s/AKfycbyAH-4t0dkfSpJ3Q-0M_j8tXRrZk1bOSilSaMm-8wDA8vrIBEF-K1RNDdGIRD4oWiUAyA/exec";
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | saving | saved | error | loading

  const gsRead = async (sheet) => {
    try {
      const res = await fetch(`${GS_URL}?action=read&sheet=${sheet}`);
      const json = await res.json();
      return json.data;
    } catch (e) { return null; }
  };
  const gsWrite = async (sheet, data) => {
    try {
      setSyncStatus("saving");
      const res = await fetch(`${GS_URL}?action=write&sheet=${sheet}&data=${encodeURIComponent(JSON.stringify(data))}`);
      const json = await res.json();
      setSyncStatus(json.success ? "saved" : "error");
      setTimeout(()=>setSyncStatus("idle"), 2000);
    } catch (e) { setSyncStatus("error"); }
  };

  // Load from localStorage with fallback (instant UI), then sync from Sheets in background
  const loadLS = (key, def) => {
    try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch{return def;}
  };
  const saveLS = (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch{}
  };

  const [investors,setInvestorsRaw]=useState(()=>loadLS("qimma_investors",DEFAULT_INVESTORS));
  const [contracts,setContractsRaw]=useState(()=>loadLS("qimma_contracts",[]));
  const [settings,setSettingsRaw]=useState(()=>loadLS("qimma_settings",{profit:50,admin:2.5,acc:10,inst:10}));

  const setInvestors = v => { const d=typeof v==="function"?v(investors):v; setInvestorsRaw(d); saveLS("qimma_investors",d); gsWrite("investors",d); };
  const setContracts = v => { const d=typeof v==="function"?v(contracts):v; setContractsRaw(d); saveLS("qimma_contracts",d); gsWrite("contracts",d); };
  const setSettings  = v => { const d=typeof v==="function"?v(settings):v;  setSettingsRaw(d);  saveLS("qimma_settings",d); gsWrite("settings",d); };
  const [invTxList,setInvTxListRaw]=useState(()=>loadLS("qimma_txlist",{}));
  const setInvTxList = v => { const d=typeof v==="function"?v(invTxList):v; setInvTxListRaw(d); saveLS("qimma_txlist",d); gsWrite("txlist",d); };
  const [loans,setLoansRaw]=useState(()=>loadLS("qimma_loans",[]));
  const setLoans = v => { const d=typeof v==="function"?v(loans):v; setLoansRaw(d); saveLS("qimma_loans",d); gsWrite("loans",d); };
  const [zakatTx,setZakatTxRaw]=useState(()=>loadLS("qimma_zakat",[]));
  const setZakatTx = v => { const d=typeof v==="function"?v(zakatTx):v; setZakatTxRaw(d); saveLS("qimma_zakat",d); gsWrite("zakat",d); };
  const [pending,setPendingRaw]=useState(()=>loadLS("qimma_pending",[]));
  const setPending = v => { const d=typeof v==="function"?v(pending):v; setPendingRaw(d); saveLS("qimma_pending",d); gsWrite("pending",d); };
  const [payments,setPaymentsRaw]=useState(()=>loadLS("qimma_payments",[]));
  const setPayments = v => { const d=typeof v==="function"?v(payments):v; setPaymentsRaw(d); saveLS("qimma_payments",d); gsWrite("payments",d); };
  const [completionAlert,setCompletionAlert]=useState(null);

  const toast=(msg,type="success")=>{setToastMsg(msg);setToastType(type);setTimeout(()=>setToastMsg(null),3000);};

  // On first load, try syncing from Google Sheets (overwrite local if remote has newer data)
  useEffect(()=>{
    (async ()=>{
      setSyncStatus("loading");
      const [inv, con, set, tx, ln, zk, pd, pay] = await Promise.all([
        gsRead("investors"), gsRead("contracts"), gsRead("settings"),
        gsRead("txlist"), gsRead("loans"), gsRead("zakat"),
        gsRead("pending"), gsRead("payments")
      ]);
      if (inv) { setInvestorsRaw(inv); saveLS("qimma_investors", inv); }
      if (con) { setContractsRaw(con); saveLS("qimma_contracts", con); }
      if (set) { setSettingsRaw(set); saveLS("qimma_settings", set); }
      if (tx)  { setInvTxListRaw(tx); saveLS("qimma_txlist", tx); }
      if (ln)  { setLoansRaw(ln); saveLS("qimma_loans", ln); }
      if (zk)  { setZakatTxRaw(zk); saveLS("qimma_zakat", zk); }
      if (pd)  { setPendingRaw(pd); saveLS("qimma_pending", pd); }
      if (pay) { setPaymentsRaw(pay); saveLS("qimma_payments", pay); }
      setSyncStatus("idle");
    })();
  }, []);

  const TABS=[
    {id:"dashboard",label:"🏠 الرئيسية"},
    {id:"new",label:"➕ عقد جديد"},
    {id:"contracts",label:"📋 العقود"},
    {id:"jard",label:"📊 الجرد"},
    {id:"accounts",label:"💰 الحسابات"},
    {id:"commissions",label:"📑 العمولات"},
    {id:"investors",label:"👥 المستثمرون"},
    {id:"settings",label:"⚙️ الإعدادات"},
  ];

  return (
    <div style={styles.body}>
      <div style={styles.header}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src="https://i.ibb.co/60DXm9xL/IMG-1696.png" alt="شعار قمة الفرصة" style={{height:44,width:"auto",objectFit:"contain",filter:"brightness(0) invert(1)"}}/>

          <div>
            <div style={{fontWeight:700,fontSize:14}}>مؤسسة قمة الفرصة التجارية</div>
            <div style={{fontSize:10,opacity:0.6}}>نظام إدارة التقسيط والمستثمرين</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,fontWeight:700,
            color: syncStatus==="error"?"#ff8080":syncStatus==="saving"?C.gold:syncStatus==="loading"?C.gold:"#5cd98a"}}>
            <span style={{fontSize:9}}>●</span>
            {syncStatus==="saving" ? "⏳ جارٍ الحفظ..." : syncStatus==="loading" ? "⏳ جارٍ التحميل..." : syncStatus==="error" ? "⚠️ خطأ بالحفظ" : "☁️ متصل"}
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.gold}}>
            {contracts.length} عقد
          </div>
        </div>
      </div>

      <nav style={styles.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={{...styles.navBtn,...(page===t.id?styles.navBtnActive:{})}} onClick={()=>setPage(t.id)}>{t.label}</button>
        ))}
      </nav>

      <div style={styles.main}>
        {page==="dashboard" && <Dashboard contracts={contracts} investors={investors} settings={settings}/>}
        {page==="new" && <NewContractPage investors={investors} settings={settings} contracts={contracts} onSave={c=>{setContracts(p=>[...p,c]);setPage("contracts");}} toast={toast}/>}
        {page==="contracts" && <ContractsPage contracts={contracts} investors={investors} settings={settings} onDelete={id=>setContracts(p=>p.filter(c=>c.id!==id))} payments={payments} setPayments={setPayments} toast={toast} completionAlert={completionAlert} setCompletionAlert={setCompletionAlert}/>}
        {page==="jard" && <JardPage contracts={contracts} investors={investors} settings={settings} txList={invTxList} loans={loans} zakatTx={zakatTx} pending={pending}/>}
        {page==="accounts" && <AccountsPage contracts={contracts} investors={investors} settings={settings} txList={invTxList} setTxList={setInvTxList} loans={loans} setLoans={setLoans} zakatTx={zakatTx} setZakatTx={setZakatTx} pending={pending} setPending={setPending} payments={payments}/>}
        {page==="commissions" && <CommissionsPage contracts={contracts} investors={investors} settings={settings}/>}
        {page==="investors" && <InvestorsPage investors={investors} contracts={contracts} settings={settings} payments={payments} onAdd={inv=>setInvestors(p=>[...p,inv])} onDelete={id=>setInvestors(p=>p.filter(i=>i.id!==id))} toast={toast}/>}
        {page==="settings" && <SettingsPage settings={settings} onSave={setSettings} toast={toast}/>}
      </div>

      <Toast msg={toastMsg} type={toastType}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
